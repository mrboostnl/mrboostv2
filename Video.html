  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

am); position: relative; z-index: 1; }\n.story-text {\n  position: relative;\n  min-width: 130px;\n  height: 36px;\n  overflow: hidden;\n}\n.story-line {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column; justify-content: center;\n  line-height: 1.25;\n  opacity: 0;\n  transform: translateY(115%);\n  filter: blur(3px);\n  transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.7, 0, 0.18, 1), filter 0.45s ease;\n  pointer-events: none;\n}\n.story-line.is-active {\n  opacity: 1; transform: translateY(0); filter: none;\n}\n.story-line.is-leaving {\n  opacity: 0; transform: translateY(-115%); filter: blur(3px);\n}\n.story-line .t1 {\n  font-size: 13px; font-weight: 600;\n  color: var(--cream);\n  letter-spacing: -0.005em;\n}\n.story-line .t2 {\n  font-size: 13px; font-weight: 500;\n  color: var(--text-dim);\n}\n@media (max-width: 720px) {\n  .story-text { display: none; }\n}\n\n/* ============== HEADER ============== */\n.header {\n  position: sticky; top: 0; z-index: 50;\n  padding: 24px 40px;\n  display: grid; grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  gap: 32px;\n  background: linear-gradient(to bottom, rgba(7,7,7,0.96) 0%, rgba(7,7,7,0.78) 38%, rgba(7,7,7,0.36) 72%, rgba(7,7,7,0) 100%);\n}\n.header-left { display: flex; align-items: center; gap: 14px; }\n.star-badge {\n  width: 50px; height: 50px; border-radius: 50%;\n  border: 1px solid rgba(255,255,255,0.15);\n  display: grid; place-items: center;\n  flex-shrink: 0;\n}\n.star-badge svg { width: 22px; height: 22px; color: var(--cream); }\n.header-left-text {\n  font-size: 13px; font-weight: 600; line-height: 1.3;\n  color: var(--cream);\n}\n.header-left-text .dim { font-weight: 500; color: var(--text-dim); display: block; }\n.header-center { display: flex; justify-content: center; }\n.logo-mark img { width: 48px; height: 56px; display: block; }\n.main-nav {\n  display: flex; justify-content: flex-end; gap: 36px; align-items: center;\n}\n.main-nav a {\n  font-size: 15px; font-weight: 500;\n  color: var(--cream);\n  transition: opacity 0.2s;\n  display: inline-flex; align-items: center; gap: 6px;\n  position: relative;\n}\n.main-nav a:hover { opacity: 0.65; }\n.main-nav { transition: opacity 0.5s cubic-bezier(0.5,0.5,0,1), transform 0.55s cubic-bezier(0.5,0.5,0,1), filter 0.5s cubic-bezier(0.5,0.5,0,1); }\n.main-nav.is-collapsed { opacity: 0; pointer-events: none; transform: translateY(-4px); filter: blur(2px); }\n.main-nav a.active::after {\n  content: \"\"; position: absolute; left: 0; right: 0; bottom: -6px;\n  height: 1.5px; background: var(--cream);\n}\n.main-nav a .caret { font-size: 9px; margin-top: 2px; }\n\n/* ============== PAGE TITLE ============== */\n.page-title {\n  padding: 70px 40px 30px;\n  max-width: 1480px;\n  margin: 0 auto;\n  width: 100%;\n  display: flex; flex-wrap: wrap;\n  align-items: center;\n  justify-content: space-between;\n  gap: 22px 48px;\n}\n.page-title h1 {\n  font-family: var(--display-bold);\n  font-weight: 700;\n  font-size: clamp(64px, 9vw, 130px);\n  line-height: 0.88;\n  letter-spacing: -0.045em;\n  color: var(--cream);\n}\n.page-title-right {\n  display: flex; align-items: center; gap: 30px;\n  flex: 1 1 520px;\n  justify-content: flex-end;\n}\n.check-match-btn {\n  display: inline-flex; align-items: center;\n  background: var(--yellow); color: #0a0a0a;\n  padding: 14px 26px;\n  border-radius: 999px;\n  font-size: 14px; font-weight: 600;\n  letter-spacing: -0.005em;\n  transition: background 0.3s, transform 0.3s;\n  position: relative;\n  z-index: 3;\n}\n.check-match-btn:hover { background: #fff; transform: translateY(-2px); }\n\n.asterisk-star {\n  width: 180px; height: 180px;\n  animation: rotate-slow 30s linear infinite;\n  flex-shrink: 0;\n}\n@keyframes rotate-slow { to { transform: rotate(360deg); } }\n\n/* ============== DIVIDER ============== */\n.divider {\n  height: 1px;\n  margin: 24px 40px 50px;\n  background: rgba(255,255,255,0.1);\n}\n\n/* ============== META ROW ============== */\n.meta-row {\n  padding: 0 40px 80px;\n  display: grid;\n  grid-template-columns: 1.2fr 1fr 1fr 1fr;\n  gap: 40px;\n  align-items: start;\n}\n.meta-block { display: grid; gap: 14px; align-content: start; }\n.meta-label {\n  font-size: 13px; color: var(--text-dim);\n  line-height: 1.45;\n  min-height: 18px;\n}\n.pill-row { display: flex; gap: 10px; flex-wrap: wrap; }\n.pill-dark {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 11px 22px;\n  border-radius: 999px;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.06);\n  color: var(--cream);\n  font-size: 14px; font-weight: 500;\n  transition: background 0.2s, transform 0.3s;\n}\n.pill-dark:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }\n.pill-dark.solid { background: rgba(255,255,255,0.18); border-color: transparent; }\n.pill-dark .icon { display: inline-grid; place-items: center; }\n.pill-dark .icon svg { width: 14px; height: 14px; }\n.meta-address {\n  font-size: 15px; line-height: 1.55;\n  color: var(--cream);\n}\n.meta-address.right { text-align: right; }\n.meta-address .muted { color: var(--text-dim); }\n\n/* ============== FORM CARD ============== */\n.form-card {\n  margin: 0 40px 80px;\n  background: var(--bg-card);\n  border-radius: 36px;\n  padding: 80px 90px;\n  display: grid;\n  grid-template-columns: 1.6fr 1fr;\n  gap: 100px;\n}\n.form-left { display: grid; gap: 36px; align-content: start; }\n.form-field {\n  display: grid; gap: 14px;\n  border-bottom: 1px solid rgba(255,255,255,0.12);\n  padding-bottom: 18px;\n  transition: border-color 0.3s;\n}\n.form-field:focus-within { border-bottom-color: var(--yellow); }\n.form-field label {\n  font-size: 17px; font-weight: 600;\n  color: var(--cream);\n  letter-spacing: -0.01em;\n}\n.form-field input,\n.form-field textarea {\n  width: 100%;\n  background: transparent;\n  border: none; outline: none;\n  color: var(--cream);\n  font-family: var(--body);\n  font-size: 15px; font-weight: 500;\n  padding: 0;\n  resize: vertical;\n}\n.form-field input::placeholder,\n.form-field textarea::placeholder { color: var(--text-dim); }\n.send-btn {\n  display: inline-flex; align-items: center; gap: 10px;\n  background: var(--yellow); color: #0a0a0a;\n  padding: 13px 30px;\n  border-radius: 999px;\n  font-size: 14px; font-weight: 600;\n  align-self: flex-start;\n  width: fit-content;\n  margin-top: 12px;\n  transition: background 0.3s, transform 0.3s;\n}\n.send-btn:hover { background: #fff; transform: translateY(-2px); }\n\n.form-right { display: grid; gap: 32px; align-content: start; }\n.profile-avatar {\n  width: 96px; height: 96px;\n  border-radius: 50%;\n  overflow: hidden;\n  background: #1a1a1a;\n}\n.profile-avatar img { width: 100%; height: 100%; object-fit: cover; }\n.detail-block { display: grid; gap: 6px; }\n.detail-block .lbl {\n  font-size: 14px; color: var(--text-dim);\n}\n.detail-block .val { font-size: 15px; color: var(--cream); line-height: 1.55; }\n.detail-block .val a { display: block; transition: opacity 0.2s; }\n.detail-block .val a:hover { opacity: 0.65; }\n\n/* ============== FOOTER ============== */\n.footer {\n  background: #0a0a0a;\n  color: var(--cream);\n  padding: 80px 60px 32px;\n  position: relative;\n  z-index: 45; /* above progressive-blur (z 40) so footer stays crisp */\n}\n.footer-inner {\n  position: relative;\n  z-index: 1;\n  max-width: 1480px;\n  margin: 0 auto;\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  column-gap: 60px;\n  row-gap: 40px;\n}\n\n/* Top-left: logo */\n.footer-logo {\n  grid-column: 1;\n  grid-row: 1;\n}\n.footer-logo-mark {\n  display: inline-block;\n  line-height: 0;\n  color: var(--cream);\n}\n.footer-logo-mark svg {\n  width: 200px;\n  height: auto;\n  display: block;\n}\n\n/* Top-right: nav */\n.footer-nav {\n  grid-column: 2;\n  grid-row: 1 / span 2;\n  display: flex;\n  flex-direction: column;\n  gap: 22px;\n  align-items: flex-start;\n}\n.footer-nav a {\n  font-family: var(--body); cials a {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  color: var(--cream);\n  transition: opacity 0.2s, transform 0.25s;\n}\n.footer-socials a:hover { opacity: 0.65; transform: translateY(-2px); }\n.footer-socials svg { width: 22px; height: 22px; }\n.footer-socials .w-mark {\n  font-family: var(--display-bold);\n  font-weight: 800;\n  font-size: 22px;\n  line-height: 1;\n  letter-spacing: -0.04em;\n}\n\n/* ============== PORTFOLIO ============== */\n.page-title h1 { text-wrap: pretty; }\n.page-title { align-items: center; }\n.filter-pills {\n  display: flex;\n  flex-wrap: nowrap;\n  gap: 8px;\n  align-items: center;\n  justify-content: flex-end;\n  max-width: 100%;\n}\n.filter-pill {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  padding: 11px 20px;\n  border-radius: 999px;\n  background: transparent;\n  border: 1px solid rgba(255,255,255,0.16);\n  color: var(--cream);\n  font-family: var(--body);\n  font-size: 14px;\n  font-weight: 500;\n  letter-spacing: -0.005em;\n  cursor: pointer;\n  transition: background 0.25s, color 0.25s, border-color 0.25s, transform 0.25s;\n  white-space: nowrap;\n}\n.filter-pill:hover { background: rgba(255,255,255,0.06); transform: translateY(-1px); }\n.filter-pill[data-filter-status=\"active\"] {\n  background: var(--cream);\n  color: #0a0a0a;\n  border-color: var(--cream);\n}\n\n/* Reset pill (only visible when a real filter is on) */\n.filter-pill.reset-pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 9px 18px 9px 14px;\n  background: rgba(255,255,255,0.04);\n  border-color: rgba(255,255,255,0.12);\n  color: var(--text-dim);\n  opacity: 0;\n  visibility: hidden;\n  max-width: 0;\n  margin-left: 0;\n  overflow: hidden;\n  white-space: nowrap;\n  transition: opacity 0.35s, max-width 0.35s, margin-left 0.35s, background 0.25s, color 0.25s;\n}\n.filter-pill.reset-pill svg { width: 14px; height: 14px; }\n.filter-pill.reset-pill:hover { background: rgba(255,255,255,0.1); color: var(--cream); }\n.filter-pill.reset-pill[data-filter-status=\"active\"] {\n  opacity: 1;\n  visibility: visible;\n  max-width: 180px;\n  margin-left: 4px;\n  background: rgba(255,255,255,0.04);\n  color: var(--cream);\n  border-color: rgba(255,255,255,0.18);\n}\n.filter-pill.reset-pill[data-filter-status=\"active\"]:hover { background: rgba(255,255,255,0.1); }\n\n/* Mobile filter dropdown (hidden on desktop) */\n.filter-dropdown { display: none; position: relative; width: 100%; }\n.filter-dropdown-btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 12px;\n  width: 100%;\n  padding: 14px 22px;\n  border-radius: 999px;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.14);\n  color: var(--cream);\n  font-family: var(--body);\n  font-size: 15px;\n  font-weight: 600;\n  letter-spacing: -0.005em;\n  cursor: pointer;\n  transition: background 0.25s;\n}\n.filter-dropdown-btn:hover { background: rgba(255,255,255,0.1); }\n.filter-dropdown-btn .caret {\n  display: inline-flex;\n  width: 14px;\n  height: 14px;\n  transition: transform 0.25s;\n}\n.filter-dropdown.is-open .filter-dropdown-btn .caret { transform: rotate(180deg); }\n.filter-dropdown-btn .label {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n}\n.filter-dropdown-btn .label small {\n  color: var(--text-dim);\n  font-weight: 500;\n  font-size: 13px;\n}\n.filter-menu {\n  position: absolute;\n  top: calc(100% + 8px);\n  left: 0;\n  right: 0;\n  background: #0f0f0f;\n  border: 1px solid rgba(255,255,255,0.1);\n  border-radius: 18px;\n  padding: 8px;\n  display: none;\n  flex-direction: column;\n  z-index: 30;\n  box-shadow: 0 16px 48px rgba(0,0,0,0.5);\n}\n.filter-dropdown.is-open .filter-menu { display: flex; }\n.filter-menu button {\n  text-align: left;\n  background: none;\n  border: none;\n  color: var(--cream);\n  font-family: var(--body);\n  font-size: 15px;\n  font-weight: 500;\n  padding: 14px 18px;\n  border-radius: 12px;\n  cursor: pointer;\n  transition: background 0.2s;\n}\n.filter-menu button:hover { background: rgba(255,255,255,0.06); }\n.filter-menu button[data-filter-status=\"active\"] {\n  background: var(--cream);\n  color: #0a0a0a;\n}\n.filter-menu .reset-menu-item {\n  margin-top: 4px;\n  border-top: 1px solid rgba(255,255,255,0.08);\n  border-radius: 0 0 10px 10px;\n  color: var(--text-dim);\n  font-size: 13px;\n  font-weight: 500;\n  display: none;\n}\n.filter-menu .reset-menu-item[data-filter-status=\"active\"] {\n  display: block;\n  background: transparent;\n  color: var(--cream);\n}\n\n.portfolio-grid-wrap {\n  padding: 24px 40px 140px;\n  max-width: 1480px;\n  margin: 0 auto;\n  width: 100%;\n}\n.portfolio-grid {\n  display: grid;\n  grid-template-columns: repeat(4, 1fr);\n  gap: 22px;\n}\n.portfolio-empty {\n  margin-top: 80px;\n  text-align: center;\n  color: var(--text-dim);\n  font-size: 16px;\n}\n\n/* Card */\n.pf-card {\n  display: flex;\n  flex-direction: column;\n  gap: 18px;\n  cursor: pointer;\n  position: relative;\n  transition: opacity 0.55s cubic-bezier(0.625, 0.05, 0, 1), transform 0.55s cubic-bezier(0.625, 0.05, 0, 1);\n  transform-origin: center top;\n}\n.pf-card[data-filter-status=\"active\"] {\n  opacity: 1;\n  visibility: visible;\n  transform: scale(1);\n  position: relative;\n}\n.pf-card[data-filter-status=\"transition-out\"] {\n  transition: opacity 0.3s cubic-bezier(0.625, 0.05, 0, 1), transform 0.3s cubic-bezier(0.625, 0.05, 0, 1);\n  opacity: 0;\n  visibility: visible;\n  transform: scale(0.92);\n}\n.pf-card[data-filter-status=\"not-active\"] {\n  display: none;\n}\n.pf-thumb {\n  position: relative;\n  width: 100%;\n  aspect-ratio: 9 / 16;\n  border-radius: 14px;\n  overflow: hidden;\n  background: #1a1a1a;\n  isolation: isolate;\n  cursor: pointer;\n}\n\n/* Thumbnail image / slideshow */\n.pf-slides {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n}\n.pf-slide {\n  position: absolute;\n  inset n.progressive-blur.is-hidden { opacity: 0; }\n.progressive-blur__layer { width: 100%; height: 100%; position: absolute; }\n.progressive-blur__layer.is--1 { backdrop-filter: blur(.09375em); -webkit-backdrop-filter: blur(.09375em); mask: linear-gradient(#0000 50%, #000 62.5% 75%, #0000 87.5%); -webkit-mask: linear-gradient(#0000 50%, #000 62.5% 75%, #0000 87.5%); }\n.progressive-blur__layer.is--2 { backdrop-filter: blur(.1875em); -webkit-backdrop-filter: blur(.1875em); mask: linear-gradient(#0000 62.5%, #000 75% 87.5%, #0000 100%); -webkit-mask: linear-gradient(#0000 62.5%, #000 75% 87.5%, #0000 100%); }\n.progressive-blur__layer.is--3 { backdrop-filter: blur(.375em); -webkit-backdrop-filter: blur(.375em); mask: linear-gradient(#0000 75%, #000 87.5% 100%); -webkit-mask: linear-gradient(#0000 75%, #000 87.5% 100%); }\n.progressive-blur__layer.is--4 { backdrop-filter: blur(.75em); -webkit-backdrop-filter: blur(.75em); mask: linear-gradient(#0000 82%, #000 92% 100%); -webkit-mask: linear-gradient(#0000 82%, #000 92% 100%); }\n.progressive-blur__layer.is--5 { backdrop-filter: blur(1.5em); -webkit-backdrop-filter: blur(1.5em); mask: linear-gradient(#0000 88%, #000 100%); -webkit-mask: linear-gradient(#0000 88%, #000 100%); }\n\n/* ============== RESPONSIVE ============== */\n@media (max-width: 1100px) {\n  .meta-row { grid-template-columns: 1fr 1fr; }\n  .meta-address.right { text-align: left; }\n  .form-card { padding: 50px 40px; grid-template-columns: 1fr; gap: 50px; }\n  .portfolio-grid-wrap { padding: 16px 32px 100px; }\n}\n\n/* iPad and below: collapse filter into a dropdown menu */\n@media (max-width: 1080px) {\n  .page-title { padding: 50px 32px 24px; grid-template-columns: 1fr; gap: 20px; align-items: start; }\n  .page-title-right { width: 100%; }\n  .page-title-right .filter-pills { display: none; }\n  .filter-dropdown { display: block; }\n  .portfolio-grid { grid-template-columns: repeat(3, 1fr); gap: 18px; }\n  .portfolio-grid.is-six-up { grid-template-columns: ith a play icon, top-right, on hover */\n.pf-play {\n  position: absolute; z-index: 3;\n  top: 12px; right: 12px;\n  width: 38px; height: 38px; border-radius: 999px;\n  display: grid; place-items: center;\n  background: rgba(10,10,10,0.5);\n  backdrop-filter: blur(6px);\n  -webkit-backdrop-filter: blur(6px);\n  border: 1px solid rgba(255,255,255,0.28);\n  color: #fff;\n  opacity: 0;\n  transform: scale(0.9);\n  transition: opacity 0.3s ease, transform 0.3s var(--ease-smooth);\n  pointer-events: none;\n}\n.pf-play svg { width: 15px; height: 15px; margin-left: 2px; }\n.pf-card:hover .pf-play,\n.pf-card:focus-visible .pf-play { opacity: 1; transform: scale(1); }\n@media (hover: none) { .pf-play { opacity: 1; } }\n\n.pf-card {\n  border: none; background: none; text-align: left; width: 100%;\n  font: inherit; color: inherit; padding: 0;\n}\n\n/* views subtext */\n.pf-meta { padding: 0 2px; }\n.pf-views { display: inline-flex; align-items: center; gap: 7px; }\n.pf-views svg { width: 14px; height: 14px; opacity: 0.75; }\n\n/* ============== VIDEO POPUP ============== */\n.video-modal {\n  position: fixed; inset: 0; z-index: 10000;\n  display: flex; align-items: center; justify-content: center;\n  padding: 28px;\n  opacity: 0; visibility: hidden;\n  transition: opacity 0.34s var(--ease-smooth), visibility 0.34s;\n}\n.video-modal.is-open { opacity: 1; visibility: visible; }\n.video-modal__backdrop {\n  position: absolute; inset: 0;\n  background: rgba(6,6,6,0.82);\n  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);\n}\n.video-modal__stage {\n  position: relative; z-index: 1;\n  height: min(88vh, 880px);\n  aspect-ratio: 9 / 16;\n  max-width: 100%;\n  border-radius: 20px;\n  overflow: hidden;\n  background: #000;\n  box-shadow: 0 40px 120px rgba(0,0,0,0.6);\n  transform: scale(0.96) translateY(8px);\n  transition: transform 0.42s var(--ease-smooth);\n}\n.video-modal.is-open .video-modal__stage { transform: none; }\n.video-modal__video {\n  width: 100%; heigh ------- */\n/* (Grain is provided once by each page's own ::before — duplicating it here\n   stacked two full-viewport animated overlay layers and tanked scroll perf.) */\nbody.has-chrome {\n  background: var(--bg, #131313);\n}\n\n/* ===================================================\n   HEADER BAR (story rotator + center logo + text nav)\n   Canonical = homepage. Injected by chrome.js.\n   =================================================== */\n.header {\n  position: sticky; top: 0; z-index: 50;\n  padding: 22px 32px;\n  padding-top: calc(22px + env(safe-area-inset-top));\n  display: grid; grid-template-columns: 1fr auto 1fr;\n  align-items: center;\n  background: linear-gradient(to bottom, rgba(7,7,7,0.96) 0%, rgba(7,7,7,0.78) 38%, rgba(7,7,7,0.36) 72%, rgba(7,7,7,0) 100%);\n  font-family: var(--body, 'Helvetica Neue', Helvetica, Arial, sans-serif);\n}\n.header-left { display: flex; align-items: center; gap: 12px; }\n/* Story rotator */\n.story-badge {\n  position: relative;\n  width: 50px; height: 50px;\n  display: grid; place-items: center;\n  flex-shrink: 0;\n}\n.ring-svg {\n  position: absolute; inset: 0;\n  width: 100%; height: 100%;\n  transform: rotate(-90deg);\n}\n.ring-svg circle { fill: none; stroke-width: 1.5; }\n.ring-track { stroke: rgba(255,255,255,0.14); }\n.ring-progress {\n  stroke: var(--cream, #e9e8e3);\n  stroke-linecap: round;\n  stroke-dasharray: 149.23;\n  stroke-dashoffset: 149.23;\n}\n.ring-progress.is-running { animation: story-ring-fill 4.5s linear forwards; }\n@keyframes story-ring-fill {\n  from { stroke-dashoffset: 149.23; }\n  to   { stroke-dashoffset: 0; }\n}\n.story-star { width: 22px; height: 22px; color: var(--cream, #e9e8e3); position: relative; z-index: 1; }\n.story-text { position: relative; min-width: 130px; height: 36px; overflow: hidden; }\n.story-line {\n  position: absolute; inset: 0;\n  display: flex; flex-direction: column; justify-content: center;\n  line-height: 1.25;\n  opacity: 0;\n  transform: translateY(115%);\n  'https://vz-c5b76f8d-352.b-cdn.net/92667829-a18d-4c21-8fcd-853c62a96676/playlist.m3u8', cats: ['tech'], views: 346500 },\n  { id: 'v102', src: 'https://vz-c5b76f8d-352.b-cdn.net/2600628d-b364-4c72-a670-6a408256bcba/playlist.m3u8', cats: ['food'], views: 192900 },\n];\n\n/* ===== Render ===== */\nconst grid = document.getElementById('portfolio-grid');\nlet viewMode = 'four';\n\nfunction escHtml(s) {\n  return String(s).replace(/[&<>\"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '\"':'&quot;', \"'\":'&#39;' }[c]));\n}\n\nfunction formatViews(n) {\n  return n.toLocaleString('nl-NL') + ' views';\n}\n\nconst EYE_SVG = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z\"/><circle cx=\"12\" cy=\"12\" r=\"3\"/><\u002Fsvg>';\nconst PLAY_SVG = '<svg viewBox=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><path d=\"M8 5v14l11-7z\"/><\u002Fsvg>';\n\n// Bunny serves a still poster at the same path as the stream — show it instantly\n// so every tile displays real content while (and whether or not) its video loads.\nfunction thumbUrl(src) {\n  return src.replace(/playlist\\.m3u8(\\?.*)?$/, 'thumbnail.jpg');\n}\n\nfunction cardHtml(item) {\n  return `<button type=\"button\" class=\"pf-card\" data-filter-name=\"${item.cats.join(' ')}\" data-filter-status=\"active\" data-id=\"${item.id}\" data-src=\"${item.src}\" aria-label=\"Speel video af — ${formatViews(item.views)}\">\n    <div class=\"pf-thumb\">\n      <div class=\"pf-ph\" aria-hidden=\"true\"><\u002Fdiv>\n      <img class=\"pf-poster\" src=\"${thumbUrl(item.src)}\" loading=\"lazy\" decoding=\"async\" alt=\"\" aria-hidden=\"true\">\n      <video class=\"pf-tile-video\" muted loop playsinline preload=\"none\" disablepictureinpicture><\u002Fvideo>\n      <div class=\"pf-play\">${PLAY_SVG}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"pf-meta\">\n      <span class=\"pf-sub pf-views\">${EYE_SVG}${formatViews(item.views)}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fbutton>`;\n}\n\n// Husselt de volgorde elke keer dat de pagina laadt — zo zie je steeds\n// een verse mix van video's, ongeacht de gekozen categorie.\nfunction shuffle(arr) {\n  const a = arr.slice();\n  for (let i = a.length - 1; i > 0; i--) {\n    const j = Math.floor(Math.random() * (i + 1));\n    [a[i], a[j]] = [a[j], a[i]];\n  }\n  return a;\n}\n\n/* ===== Paginated render =====\n   We never render all ~100 cards at once. We render in pages of PAGE_SIZE and\n   append the next page when the user nears the bottom (with a brief \"Laden…\"),\n   so the browser only ever holds a small batch of tiles/observers at a time. */\nconst PAGE_SIZE = 20;\nconst MASTER = shuffle(VIDEOS);\nlet shownCount = 0;\nlet loadingMore = false;\nlet loadSentinel = null;\n\nfunction currentList() {\n  if (activeCats.size === 0) return MASTER;\n  return MASTER.filter(v => v.cats.some(c => activeCats.has(c)));\n}\n\nfunction appendCards(items) {\n  const tpl = document.createElement('template');\n  tpl.innerHTML = items.map(cardHtml).join('');\n  const nodes = [...tpl.content.children];\n  nodes.forEach(card => {\n    grid.appendChild(card);\n    const img = card.querySelector('.pf-poster');\n    if (img) {\n      if (img.complete && img.naturalWidth) img.classList.add('is-loaded');\n      else {\n        img.addEventListener('load', () => img.classList.add('is-loaded'), { once: true });\n        img.addEventListener('error', () => img.classList.add('is-loaded'), { once: true });\n      }\n    }\n    if (tileIO) tileIO.observe(card);\n    else { // no IntersectionObserver: just autoplay what we render\n      const v = card.querySelector('.pf-tile-video');\n      if (v) { attachHls(v, card.dataset.src, { muted: true, maxBufferLength: 6 });\n        v.addEventListener('playing', () => v.classList.add('is-playing'), { once: true });\n        v.play().catch(() => {}); }\n    }\n  });\n}\n\nfunction loadMore() {\n  const list = currentList();\n  if (shownCount >= list.length) { updateSentinel(list.length); return; }\n  const next = list.slice(shownCount, shownCount + PAGE_SIZE);\n  appendCards(next);\n  shownCount += next.length;\n  updateSentinel(list.length);\n}\n\nfunction requestMore() {\n  if (loadingMore) return;\n  if (shownCount >= currentList().length) return;\n  loadingMore = true;\n  if (loadSentinel) loadSentinel.classList.add('is-loading');\n  // brief \"Laden…\" beat, then reveal the next batch\n  setTimeout(() => {\n    loadMore();\n    loadingMore = false;\n    if (loadSentinel && shownCount >= currentList().length) loadSentinel.classList.remove('is-loading');\n  }, 380);\n}\n\nfunction updateSentinel(total) {\n  if (!loadSentinel) return;\n  const more = shownCount < total;\n  loadSentinel.classList.toggle('is-done', !more);\n  if (!more) loadSentinel.classList.remove('is-loading');\n}\n\nfunction updateEmptyState() {\n  const empty = document.querySelector('.portfolio-empty');\n  if (empty) empty.hidden = currentList().length > 0;\n}\n\nfunction renderReset() {\n  destroyAllTiles();\n  grid.innerHTML = '';\n  shownCount = 0;\n  buildTileIO();\n  loadMore();\n  updateEmptyState();\n}\n\n/* ===== HLS helper (hls.js elsewhere, native HLS on Safari) ===== */\nfunction attachHls(video, src, { muted, maxBufferLength = 10 }) {\n  video.muted = muted;\n  const canUseHlsJs = !!(window.Hls && window.Hls.isSupported());\n  if (canUseHlsJs) {\n    const hls = new window.Hls({ maxBufferLength: maxBufferLength, capLevelToPlayerSize: true, startLevel: -1 });\n    hls.attachMedia(video);\n    hls.on(window.Hls.Events.MEDIA_ATTACHED, () => hls.loadSource(src));\n    // Once the manifest is ready, kick off playback (hls.js needs an explicit\n    // play() — the autoplay attribute alone is unreliable across browsers).\n    hls.on(window.Hls.Events.MANIFEST_PARSED, () => {\n      video.play().catch(() => {});\n    });\n    video._hls = hls;\n  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {\n    // Safari native HLS\n    video.src = src;\n    video.addEventListener('loadedmetadata', () => { video.play().catch(() => {}); }, { once: true });\n  }\n}\nfunction detachHls(video) {\n  if (video._hls) { try { video._hls.destroy(); } catch (e) {} video._hls = null; }\n  try { video.pause(); } catch (e) {}\n  video.removeAttribute('src');\n  try { video.load(); } catch (e) {}\n}\n\n/* ===== Tile videos: lazy-attach, autoplay muted in view, LRU teardown =====\n   - Out of view: pause + stop network (keep buffer) so scrolling back resumes\n     instantly instead of re-downloading.\n   - At most MAX_LIVE streams stay attached; the least-recently-seen one is fully\n     torn down (reverting to its instant poster) so we never pile up 100 decoders. */\nlet tileIO = null;\nconst MAX_LIVE = 14;\nconst liveOrder = [];\n\nfunction touchLive(v) {\n  const i = liveOrder.indexOf(v);\n  if (i !== -1) liveOrder.splice(i, 1);\n  liveOrder.push(v);\n  while (liveOrder.length > MAX_LIVE) {\n    const old = liveOrder[0];\n    if (old === v) break;\n    liveOrder.shift();\n    detachHls(old);\n    old.classList.remove('is-playing'); // poster fades back in\n  }\n}\nfunction suspendTile(v) {\n  try { v.pause(); } catch (e) {}\n  v.classList.remove('is-playing');\n  if (v._hls) { try { v._hls.stopLoad(); } catch (e) {} }\n}\nfunction resumeTile(v, src) {\n  if (!v._hls && !v.src) {\n    attachHls(v, src, { muted: true, maxBufferLength: 6 });\n    v.addEventListener('playing', () => v.classList.add('is-playing'));\n  } else if (v._hls) {\n    try { v._hls.startLoad(); } catch (e) {}\n  }\n  v.muted = true;\n  v.play().catch(() => {});\n  touchLive(v);\n}\nfunction buildTileIO() {\n  if (tileIO) tileIO.disconnect();\n  if (!('IntersectionObserver' in window)) { tileIO = null; return; }\n  tileIO = new IntersectionObserver((entries) => {\n    entries.forEach(entry => {\n      const card = entry.target;\n      const v = card.querySelector('.pf-tile-video');\n      if (!v) return;\n      if (entry.isIntersecting) resumeTile(v, card.dataset.src);\n      else suspendTile(v);\n    });\n  }, { rootMargin: '400px 0px', threshold: 0.1 });\n}\nfunction destroyAllTiles() {\n  if (tileIO) tileIO.disconnect();\n  grid.querySelectorAll('.pf-tile-video').forEach(v => detachHls(v));\n  liveOrder.length = 0;\n}\n\n/* ===== Click a tile → open the popup player (delegated, survives paging) ===== */\ngrid.addEventListener('click', (e) => {\n  const card = e.target.closest('.pf-card');\n  if (card && grid.contains(card)) openVideoModal(card.dataset.src);\n});\n\n/* ===== Filter pills/menu → drive the data + re-render (data-driven) ===== */\nconst FILTER_LABELS = { all:'Alles', food:'Food', bouw:'Bouw', tech:'Tech', shops:'Shops', events:'Events', business:'Business', auto:'Auto' };\nconst activeCats = new Set(); // empty => all\n\nfunction syncFilterButtons() {\n  document.querySelectorAll('[data-filter-target]').forEach(btn => {\n    const t = (btn.getAttribute('data-filter-target') || '').trim().toLowerCase();\n    let on = false;\n    if (t === 'all') on = activeCats.size === 0;\n    else if (t === 'reset') on = activeCats.size > 0;\n    else on = activeCats.has(t);\n    btn.setAttribute('data-filter-status', on ? 'active' : 'not-active');\n    if (btn.hasAttribute('aria-pressed')) btn.setAttribute('aria-pressed', on ? 'true' : 'false');\n  });\n  const labelEl = document.getElementById('filter-dropdown-label');\n  if (labelEl) {\n    const tags = [...activeCats];\n    labelEl.textContent = tags.length === 0 ? ('Alles (' + VIDEOS.length + ')')\n      : tags.length === 1 ? (FILTER_LABELS[tags[0]] || tags[0])\n      : tags.length + ' filters';\n  }\n}\n// Show the total video count on every \"Alles\" control — derived from the data,\n// so it updates automatically as videos are added.\nfunction syncAllCount() {\n  document.querySelectorAll('[data-filter-target=\"all\"]').forEach(btn => {\n    btn.textContent = 'Alles (' + VIDEOS.length + ')';\n  });\n}\nfunction onFilterClick(target) {\n  const t = (target || '').trim().toLowerCase();\n  if (t === 'all' || t === 'reset') activeCats.clear();\n  else if (activeCats.has(t)) activeCats.delete(t);\n  else activeCats.add(t);\n  syncFilterButtons();\n  renderReset();\n  // if we're scrolled past the top of the grid, bring it back into view\n  const wrap = grid.closest('.portfolio-grid-wrap') || grid;\n  const top = wrap.getBoundingClientRect().top + window.scrollY - 120;\n  if (window.scrollY > top) window.scrollTo({ top: top, behavior: 'smooth' });\n}\nfunction initFilter() {\n  syncAllCount();\n  document.querySelectorAll('[data-filter-target]').forEach(btn => {\n    btn.addEventListener('click', () => onFilterClick(btn.getAttribute('data-filter-target')));\n  });\n  syncFilterButtons();\n}\n\n/* ===== \"Laden…\" sentinel that pulls in the next page near the bottom ===== */\nfunction initLoadMore() {\n  const wrap = grid.closest('.portfolio-grid-wrap') || grid.parentElement;\n  loadSentinel = document.createElement('div');\n  loadSentinel.className = 'pf-loadmore';\n  loadSentinel.id = 'pf-loadmore';\n  loadSentinel.innerHTML = '<span class=\"pf-loadmore__spin\" aria-hidden=\"true\"><\u002Fspan><span class=\"pf-loadmore__txt\">Laden…<\u002Fspan>';\n  grid.insertAdjacentElement('afterend', loadSentinel);\n  if ('IntersectionObserver' in window) {\n    const io = new IntersectionObserver((entries) => {\n      if (entries.some(e => e.isIntersecting)) requestMore();\n    }, { rootMargin: '700px 0px' });\n    io.observe(loadSentinel);\n  } else {\n    window.addEventListener('scroll', () => {\n      if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 700) requestMore();\n    }, { passive: true });\n  }\n}\n\n/* ===== Filter system (data-attribute driven, multi-select with reset) ===== */\nfunction initMultiFilter(){\n  const transitionDelay = 300;\n  const groups = [...document.querySelectorAll('[data-filter-group]')];\n  groups.forEach(group => {\n    const targetMatch = (group.getAttribute('data-filter-target-match') || 'multi').trim().toLowerCase();\n    const nameMatch   = (group.getAttribute('data-filter-name-match')   || 'multi').trim().toLowerCase();\n    const buttons = [...group.querySelectorAll('[data-filter-target]')];\n    const items   = [...group.querySelectorAll('[data-filter-name]')];\n\n    // Auto-collect tokens from children (Webflow-style)\n    items.forEach(item => {\n      const collectors = item.querySelectorAll('[data-filter-name-collect]');\n      if (!collectors.length) return;\n      const seen = new Set(), tokens = [];\n      collectors.forEach(c => {\n        const v = (c.getAttribute('data-filter-name-collect') || '').trim().toLowerCase();\n        if (v && !seen.has(v)) { seen.add(v); tokens.push(v); }\n      });\n      if (tokens.length) item.setAttribute('data-filter-name', tokens.join(' '));\n    });\n\n    const itemTokens = new Map();\n    items.forEach(el => {\n      const raw = (el.getAttribute('data-filter-name') || '').trim().toLowerCase();\n      const tokens = raw ? raw.split(/\\s+/).filter(Boolean) : [];\n      itemTokens.set(el, new Set(tokens));\n    });\n\n    const setItemState = (el, on) => {\n      const next = on ? 'active' : 'not-active';\n      if (el.getAttribute('data-filter-status') !== next) {\n        el.setAttribute('data-filter-status', next);\n        el.setAttribute('aria-hidden', on ? 'false' : 'true');\n      }\n    };\n    const setButtonState = (btn, on) => {\n      const next = on ? 'active' : 'not-active';\n      if (btn.getAttribute('data-filter-status') !== next) {\n        btn.setAttribute('data-filter-status', next);\n        btn.setAttribute('aria-pressed', on ? 'true' : 'false');\n      }\n    };\n\n    let activeTags = targetMatch === 'single' ? null : new Set(['all']);\n    const hasRealActive = () => {\n      if (targetMatch === 'single') return activeTags !== null;\n      return activeTags.size > 0 && !activeTags.has('all');\n    };\n    const resetAll = () => {\n      if (targetMatch === 'single') activeTags = null;\n      else { activeTags.clear(); activeTags.add('all'); }\n    };\n\n    const itemMatches = (el) => {\n      if (!hasRealActive()) return true;\n      const tokens = itemTokens.get(el);\n      if (targetMatch === 'single') return tokens.has(activeTags);\n      const selected = [...activeTags];\n      if (nameMatch === 'single') {\n        for (let i = 0; i < selected.length; i++) if (!tokens.has(selected[i])) return false;\n        return true;\n      } else {\n        for (let i = 0; i < selected.length; i++) if (tokens.has(selected[i])) return true;\n        return false;\n      }\n    };\n\n    const paint = (rawTarget) => {\n      const target = (rawTarget || '').trim().toLowerCase();\n      if ((target === 'all' || target === 'reset') && !hasRealActive()) return;\n      if (target === 'all' || target === 'reset') {\n        resetAll();\n      } else if (targetMatch === 'single') {\n        activeTags = target;\n      } else {\n        if (activeTags.has('all')) activeTags.delete('all');\n        if (activeTags.has(target)) activeTags.delete(target);\n        else activeTags.add(target);\n        if (activeTags.size === 0) resetAll();\n      }\n\n      items.forEach(el => {\n        if (el._ft) clearTimeout(el._ft);\n        const next = itemMatches(el);\n        const cur = el.getAttribute('data-filter-status');\n        if (cur === 'active' && transitionDelay > 0 && !next) {\n          el.setAttribute('data-filter-status','transition-out');\n          el._ft = setTimeout(() => { setItemState(el, next); el._ft = null; }, transitionDelay);\n        } else if (transitionDelay > 0 && cur !== 'active' && next) {\n          // bring in immediately\n          setItemState(el, next);\n        } else {\n          setItemState(el, next);\n        }\n      });\n\n      buttons.forEach(btn => {\n        const t = (btn.getAttribute('data-filter-target') || '').trim().toLowerCase();\n        let on = false;\n        if (t === 'all') on = !hasRealActive();\n        else if (t === 'reset') on = hasRealActive();\n        else on = targetMatch === 'single' ? activeTags === t : activeTags.has(t);\n        setButtonState(btn, on);\n      });\n\n      // Notify listeners (dropdown label, scroll, dropdown close)\n      group.dispatchEvent(new CustomEvent('filterchange', {\n        detail: { activeTags: targetMatch === 'single' ? activeTags : [...activeTags] }\n      }));\n    };\n\n    group.addEventListener('click', e => {\n      const btn = e.target.closest('[data-filter-target]');\n      if (btn && group.contains(btn)) paint(btn.getAttribute('data-filter-target'));\n    });\n\n    paint('all');\n  });\n}\n\n/* ===== Dropdown open/close + label sync ===== */\nconst FILTER_LABEL = { all:'Alles', food:'Food', bouw:'Bouw', tech:'Tech', shops:'Shops', events:'Events', business:'Business' };\nconst dropdown = document.getElementById('filter-dropdown');\nconst dropdownBtn = document.getElementById('filter-dropdown-btn');\nconst dropdownLabel = document.getElementById('filter-dropdown-label');\nconst filterGroup = document.querySelector('[data-filter-group]');\n\ndropdownBtn.addEventListener('click', (e) => {\n  e.stopPropagation();\n  const open = dropdown.classList.toggle('is-open');\n  dropdownBtn.setAttribute('aria-expanded', open ? 'true' : 'false');\n});\ndocument.addEventListener('click', (e) => {\n  if (!dropdown.contains(e.target)) {\n    dropdown.classList.remove('is-open');\n    dropdownBtn.setAttribute('aria-expanded', 'false');\n  }\n});\n\nfilterGroup.addEventListener('filterchange', (e) => {\n  const tags = Array.isArray(e.detail.activeTags) ? e.detail.activeTags.filter(t => t !== 'all') : [];\n  if (tags.length === 0) dropdownLabel.textContent = 'Alles';\n  else if (tags.length === 1) dropdownLabel.textContent = FILTER_LABEL[tags[0]] || tags[0];\n  else dropdownLabel.textContent = tags.length + ' filters';\ t ---------- */\n  function bind(button) {\n    function copy() {\n      var email = button.getAttribute('data-copy-email') ||\n                  (button.querySelector('[data-copy-email-element]') && button.querySelector('[data-copy-email-element]').textContent.trim());\n      if (!email) return;\n      var doSet = function () {\n        button.setAttribute('data-copy-button', 'copied');\n        button.setAttribute('aria-label', 'E-mailadres gekopieerd!');\n      };\n      if (navigator.clipboard && navigator.clipboard.writeText) {\n        navigator.clipboard.writeText(email).then(doSet).catch(function () { fallbackCopy(email); doSet(); });\n      } else {\n        fallbackCopy(email);\n        doSet();\n      }\n    }\n    function fallbackCopy(text) {\n      var ta = document.createElement('textarea');\n      ta.value = text;\n      ta.style.position = 'fixed';\n      ta.style.left = '-9999px';\n      document.body.appendChild(ta);\n      ta.select();\n      try { document.execCommand('copy'); } catch (e) {}\n      document.body.removeChild(ta);\n    }\n    function reset() {\n      button.removeAttribute('data-copy-button');\n      button.setAttribute('aria-label', 'Kopieer e-mailadres naar klembord');\n    }\n    button.addEventListener('click', function (e) { e.preventDefault(); copy(); });\n    button.addEventListener('keydown', function (e) {\n      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); copy(); }\n    });\n    button.addEventListener('mouseleave', function () { reset(); button.blur(); });\n    button.addEventListener('blur', reset);\n  }\n\n  function injectInto(footerBlock) {\n    if (!footerBlock || footerBlock.querySelector('.copy-email-wrapper')) return;\n    var wrapper = buildButton();\n    // Insert right after the .footer-contact-btn (the yellow Contact pill) if present,\n    // otherwise prepend.\n    var contactBtn = footerBlock.querySelector('.footer-contact-btn');\n    if (contactBtn && contactBtn.parentNode === footerBlo ML = '';\n      btn.appendChild(wrap);\n      textHost = wrap;\n    }\n    var text = textHost.textContent;\n    if (!text) return;\n    btn.setAttribute('data-btn-letter-slide-host', '');\n    btn.setAttribute('data-btn-letter-slide', '');\n    splitChars(textHost, text);\n  }\n\n  function run() {\n    var targets = document.querySelectorAll(\n      '.pill-white, .check-match-btn, .case-live-btn, .footer-contact-btn, .chip-pill'\n    );\n    targets.forEach(transformButton);\n  }\n\n  function start() {\n    run();\n    // Watch for late-mounted buttons (e.g. React-rendered homepage)\n    var observer = new MutationObserver(function () { run(); });\n    observer.observe(document.body, { childList: true, subtree: true });\n    setTimeout(function () { observer.disconnect(); }, 10000);\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', start);\n  } else {\n    start();\n  }\n})();\n\n<\u002Fscript>\n<!-- enhancement-scripts --><!-- Native scroll (Lenis disabled — smooth-scroll was causing perceived lag) -->\n<script>\n(function(){\n  window.__lenis = {\n    start: function(){ document.documentElement.style.overflow = ''; document.body.style.overflow = ''; },\n    stop:  function(){},\n    raf:   function(){},\n    on:    function(){},\n  };\n})();\n<\u002Fscript>\n<!-- Shared Chrome (hamburger / FAB / footer / grain / blur) -->\n<script src=\"7f164019-bc60-41fb-a0c8-705de9a7d9d2\" defer=\"\"><\u002Fscript>\n<script src=\"c2b718ed-cd3a-487a-b890-6fba5d7c255a\" defer=\"\"><\u002Fscript>\n<script>document.addEventListener('DOMContentLoaded', function(){ if(window.gsap && window.ScrollTrigger) gsap.registerPlugin(ScrollTrigger); });<\u002Fscript>\n<!-- UNIFIED BUTTON SYSTEM -->\n<style data-btn-unify=\"\">\n/* =====================================================\n   MR BOOST — UNIFIED BUTTON SYSTEM\n   One height, radius, type scale, spacing + the Osmo\n   \"button-038\" text-stagger + bg-scale hover for every CTA.\n   Contextual fill colours are preserved per button.\n   ===================================================== */\n\n:root{\n  --u-btn-ease: cubic-bezier(0.625, 0.05, 0, 1);\n  --u-btn-stagger: 0.015s;\n}\n\n/* ---------- Base shell (applies to every unified CTA) ---------- */\n[data-u-btn]{\n  font-family: var(--body, 'Helvetica Neue', Helvetica, Arial, sans-serif) !important;\n  font-size: 15px !important;\n  font-weight: 600 !important;\n  letter-spacing: -0.005em !important;\n  text-transform: none !important;\n  line-height: 1 !important;\n  border-radius: 999px !important;\n  padding: 0 !important;\n  margin-top: 0;\n  border: 0 !important;\n  outline: none;\n  background: transparent !important;\n  background-color: transparent !important;\n  box-shadow: none !important;\n  color: var(--u-fg, #111);\n  text-decoration: none !important;\n  cursor: pointer;\n  display: inline-grid !important;\n  position: relative;\n  transform: none !important;\n  transition: none !important;\n  -webkit-user-select: none; user-select: none;\n  -webkit-tap-highlight-color: transparent;\n  overflow: visible;\n  isolation: isolate;\n}\n\n/* The scalable fill layer — carries each button's own colour/border */\n.u-btn__bg{\n  grid-area: 1 / 1;\n  width: 100%;\n  height: 100%;\n  border-radius: 999px;\n  background: var(--u-bg, #fff);\n  border: var(--u-border, 0 solid transparent);\n  transition: scale 0.45s var(--u-btn-ease);\n  will-change: transform;\n  z-index: 0;\n}\n\n.u-btn__inner{\n  grid-area: 1 / 1;\n  z-index: 1;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  gap: 9px;\n  padding: 14px 28px;            /* the single source of height + side spacing */\n  position: relative;\n  color: var(--u-fg, #111);\n}\n\n/* Kept icons (e.g. TikTok) sit inline, do not animate */\n.u-btn__inner > svg,\n.u-btn__inner > img{\n  flex-shrink: 0;\n  width: 16px;\n  height: 16px;\n  display: block;\n}\n\n/* The text + the per-letter stagger */\n.u-btn__text{\n  display: inline-block;\n  line-height: 1.15;\n  clip-path: inset(-12% 0%);\n}\n.u-btn__text > span{\n  display: inline-block;\n  white-space: pre;\n  translate: 0 0 0;\n  text-shadow: 0 1.3em currentColor;\n  transition: translate 0.55s var(--u-btn-ease);\n  transition-delay: calc(var(--i, 0) * var(--u-btn-stagger));\n}\n\n@media (hover: hover) and (pointer: fine) and (prefers-reduced-motion: no-preference){\n  [data-u-btn]:hover .u-btn__bg,\n  [data-u-btn]:focus-visible .u-btn__bg{\n    scale: var(--u-sx, 1) var(--u-sy, 1);\n    transition: scale 0.55s 0.05s var(--u-btn-ease);\n  }\n  [data-u-btn]:hover .u-btn__text > span,\n  [data-u-btn]:focus-visible .u-btn__text > span{\n    translate: 0 -1.3em 0;\n    transition-delay: calc(var(--i, 0) * var(--u-btn-stagger) + 0.05s);\n  }\n}\n\n/* Keyboard focus ring */\n[data-u-btn]:focus-visible{\n  outline: 2px solid var(--u-fg, #111);\n  outline-offset: 3px;\n  border-radius: 999px;\n}\n\n/* ---------- Fallback: hide decorative arrows if JS is unavailable ---------- */\n.watch-all-pill .arr,\n.cta-session__btn > svg,\n.case-live-btn > svg{ display: none !important; }\n\n/* ===================================================\n   \"START A PROJECT\" FAB — same height + Apple-glass\n   =================================================== */\n.sp-fab{\n  padding: 14px 28px !important;\n  gap: 0 !important;\n  font-family: var(--body, 'Helvetica Neue', Helvetica, Arial, sans-serif) !important;\n  font-size: 15px !important;\n  font-weight: 600 !important;\n  letter-spacing: -0.005em !important;\n  border-radius: 999px !important;\n  background: rgba(24, 24, 24, 0.45) !important;\n  -webkit-backdrop-filter: blur(20px) saturate(180%) !important;\n  backdrop-filter: blur(20px) saturate(180%) !important;\n  border: 1px solid rgba(255, 255, 255, 0.18) !important;\n  box-shadow:\n    0 18px 48px rgba(0, 0, 0, 0.45),\n    inset 0 1px 0 rgba(255, 255, 255, 0.22),\n    inset 0 -1px 0 rgba(0, 0, 0, 0.4) !important;\n  overflow: hidden;\n  position: fixed;\n}\n/* subtle moving sheen for the glass */\n.sp-fab::before{\n  content: \"\";\n  position: absolute;\n  inset: 0;\n  border-radius: inherit;\n  pointer-events: none;\n  background: linear-gradient(\n    120deg,\n    rgba(255,255,255,0) 35%,\n    rgba(255,255,255,0.14) 50%,\n    rgba(255,255,255,0) 65%);\n  opacity: 0;\n  transition: opacity 0.5s var(--u-btn-ease);\n}\n.sp-fab:hover::before{ opacity: 1; }\n.sp-fab__dot-mark{ display: none !important; }\n\n/* ===================================================\n   Strip decorative arrows/symbols from secondary\n   controls (labels stay, navigation still works)\n   =================================================== */\n.next-btn .a,\n.back-btn > span,\n.home-link > span:first-child,\n.close-btn .x{ display: none !important; }\n\n.next-btn,\n.back-btn,\n.home-link,\n.close-btn{\n  font-family: var(--body, 'Helvetica Neue', Helvetica, Arial, sans-serif) !important;\n}\n.next-btn,\n.back-btn{ gap: 0 !important; }\n\n<\u002Fstyle>\n<script data-btn-unify=\"\">\n/* =====================================================\n   MR BOOST — UNIFIED BUTTON SYSTEM (runtime)\n   Restructures every CTA into the Osmo \"button-038\"\n   markup: a scalable bg layer + a per-letter slide-up\n   label. Contextual colours are read from the live\n   element so each button keeps its own fill.\n   ===================================================== */\n(function () {\n  if (window.__uBtnReady) return;\n  window.__uBtnReady = true;\n\n  /* selector  ->  { keepIcon }  */\n  var TARGETS = [\n    { sel: '.pill-white' },\n    { sel: '.cta-session__btn' },\n    { sel: '.check-match-btn' },\n    { sel: '.footer-contact-btn' },\n    { sel: '.case-live-btn' },\n    { sel: '.cs-btn' },\n    { sel: '.team-section__handle', keepIcon: true }\n  ];\n\n  /* glyphs we never want inside a label */\n  var SYMBOL_RE = /[\\u2012-\\u2015\\u2190-\\u21FF\\u2794-\\u27BF\\u2B00-\\u2BFF\\u2022\\u00B7\\u2192\\u2197\\u2198\\u2196\\u2199\\u2190]/g;\n\n  function labelOf(btn) {\n    var clone = btn.cloneNode(true);\n    clone.querySelectorAll('svg, img').forEach(function (n) { n.remove(); });\n    return clone.textContent.replace(SYMBOL_RE, '').replace(/\\s+/g, ' ').trim();\n  }\n\n  function splitInto(textEl, label) {\n    Array.from(label).forEach(function (ch, i) {\n      var s = document.createElement('span');\n      s.style.setProperty('--i', i);\n      s.textContent = ch;\n      textEl.appendChild(s);\n    });\n  }\n\n  function build(btn, opts) {\n    if (btn.__uBtn) return;\n    btn.__uBtn = true;\n\n    var cs = getComputedStyle(btn);\n    var bg = cs.backgroundColor;\n    var fg = cs.color;\n    var bw = parseFloat(cs.borderTopWidth) || 0;\n    var border = bw > 0\n      ? (cs.borderTopWidth + ' ' + cs.borderTopStyle + ' ' + cs.borderTopColor)\n      : '0 solid transparent';\n\n    var icon = null;\n    if (opts && opts.keepIcon) {\n      var found = btn.querySelector('svg, img');\n      if (found) icon = found.cloneNode(true);\n    }\n\n    var label = labelOf(btn);\n    if (!label && !icon) return;\n\n    /* guard the legacy letter-slide script so it leaves this node alone */\n    btn.setAttribute('data-btn-letter-slide-host', '');\n    btn.setAttribute('data-u-btn', '');\n    btn.style.setProperty('--u-bg', bg);\n    btn.style.setProperty('--u-fg', fg);\n    btn.style.setProperty('--u-border', border);\n\n    var bgEl = document.createElement('span');\n    bgEl.className = 'u-btn__bg';\n\n    var inner = document.createElement('span');\n    inner.className = 'u-btn__inner';\n    if (icon) inner.appendChild(icon);\n\n    var textEl = document.createElement('span');\n    textEl.className = 'u-btn__text';\n    splitInto(textEl, label);\n    inner.appendChild(textEl);\n\n    btn.innerHTML = '';\n    btn.appendChild(bgEl);\n    btn.appendChild(inner);\n\n    /* subtle inward \"press\" on hover (Osmo defaults: -10w / -5h) */\n    requestAnimationFrame(function () {\n      var w = btn.offsetWidth, h = btn.offsetHeight;\n      if (w && h) {\n        btn.style.setProperty('--u-sx', (w - 10) / w);\n        btn.style.setProperty('--u-sy', (h - 5) / h);\n      }\n    });\n  }\n\n  function run() {\n    TARGETS.forEach(function (t) {\n      document.querySelectorAll(t.sel).forEach(function (btn) {\n        build(btn, t);\n      });\n    });\n  }\n\n  function start() {\n    run();\n    // React renders the homepage CTAs after first paint — watch for them.\n    var obs = new MutationObserver(function () { run(); });\n    obs.observe(document.body, { childList: true, subtree: true });\n    [200, 600, 1200, 2500].forEach(function (d) { setTimeout(run, d); });\n    setTimeout(function () { obs.disconnect(); }, 14000);\n  }\n\n  function boot() {\n    if (document.fonts && document.fonts.ready) {\n      document.fonts.ready.then(start);\n    } else {\n      start();\n    }\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', boot);\n  } else {\n    boot();\n  }\n})();\n\n<\u002Fscript>\n\n<script src=\"c5e4464a-3d15-45fc-bef2-b95df86c11c0\" defer=\"\"><\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
