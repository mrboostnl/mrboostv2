<meta charset="UTF-8" />

<link rel="apple-touch-icon" href="favicon.png" />
<title>Boost CRM</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  @font-face { font-family:'Gotham Ultra'; src:url('assets/GothamUltra.otf') format('opentype'); font-weight:900; font-style:normal; font-display:swap; }
  @font-face { font-family:'Helvetica Neue'; src:local('Helvetica Neue'),local('HelveticaNeue'),local('Helvetica'),local('Arial'); font-weight:400; }
  @font-face { font-family:'Helvetica Neue'; src:local('Helvetica Neue Medium'),local('HelveticaNeue-Medium'),local('Helvetica'),local('Arial'); font-weight:500; }
  @font-face { font-family:'Helvetica Neue'; src:local('Helvetica Neue Bold'),local('HelveticaNeue-Bold'),local('Helvetica-Bold'),local('Arial'); font-weight:700; }
</style>
<style>
:root{
  --bg:#0a0a0a; --bg-2:#0e0e0d; --panel:#121211; --panel-2:#161615;
  --text:#f2f2f2; --text-dim:#8a8a8a; --cream:#e9e8e3; --cream-2:#d9d8d2; --yellow:#F8FF88;
  --line:rgba(255,255,255,0.09); --line-2:rgba(255,255,255,0.14);
  --display:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --ultra:'Gotham Ultra','Anton','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(0.625,0.05,0,1); --ease-out:cubic-bezier(0.16,1,0.3,1);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--display);font-weight:500;-webkit-font-smoothing:antialiased;letter-spacing:-0.005em;min-height:100%;}
body{min-height:100vh;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
img,svg{display:block;max-width:100%;}
::selection{background:var(--cream);color:#0a0a0a;}

/* ============ LOGIN ============ */
.login{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
.login__card{ width:100%; max-width:380px; text-align:center; }
.login__logo{ height:40px; width:auto; margin:0 auto 40px; }
.login__eyebrow{ display:inline-flex; align-items:center; gap:9px; font-size:11px; font-weight:700; letter-spacing:.22em; text-transform:uppercase; color:var(--text-dim); margin-bottom:16px; }
.login__eyebrow .dot{ width:6px;height:6px;border-radius:50%;background:var(--yellow); }
.login__title{ font-family:var(--ultra); font-weight:900; font-size:34px; line-height:1; letter-spacing:-.02em; text-transform:uppercase; color:var(--cream); }
.login__sub{ margin-top:14px; font-size:14px; color:var(--text-dim); }
.login__form{ margin-top:30px; }
.login__input{
  -webkit-appearance:none; appearance:none; width:100%; text-align:center;
  padding:18px 20px; border-radius:12px; border:1px solid var(--line-2);
  background:rgba(255,255,255,.02); color:var(--cream);
  font-family:var(--ultra); font-size:22px; letter-spacing:.32em; font-weight:900;
  transition:border-color .2s, background .2s;
}
.login__input::placeholder{ font-family:var(--display); font-weight:500; letter-spacing:.04em; font-size:15px; color:rgba(255,255,255,.35); }
.login__input:focus{ outline:none; border-color:var(--cream); background:rgba(255,255,255,.035); }
.login.shake .login__input{ animation:shake .42s var(--ease); border-color:#ff5c34; }
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
.login__btn{
  width:100%; margin-top:12px; padding:18px; border-radius:12px;
  background:var(--cream); color:#0a0a0a; font-size:14px; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
  display:inline-flex; align-items:center; justify-content:center; gap:10px;
  transition:transform .2s var(--ease-out), background .2s;
}
.login__btn:hover{ transform:translateY(-2px); background:#fff; }
.login__btn svg{ width:16px;height:16px; }
.login__err{ margin-top:14px; font-size:13px; color:#ff7a57; min-height:1em; opacity:0; transition:opacity .2s; }
.login__err.show{ opacity:1; }
.login__hint{ margin-top:26px; font-size:12px; color:rgba(255,255,255,.32); line-height:1.5; }

/* ============ APP ============ */
.app{ display:none; min-height:100vh; flex-direction:column; }
.app.show{ display:flex; }

.topbar{ position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:18px; padding:18px 28px; background:rgba(10,10,10,.86); backdrop-filter:blur(12px); border-bottom:1px solid var(--line); }
.topbar__brand{ display:flex; align-items:center; gap:14px; }
.topbar__logo{ height:30px; width:auto; }
.topbar__name{ font-family:var(--ultra); font-size:13px; letter-spacing:.04em; text-transform:uppercase; color:var(--cream); padding-left:14px; border-left:1px solid var(--line-2); }
.topbar__spacer{ flex:1; }
.topbar__btn{ display:inline-flex; align-items:center; gap:9px; font-size:13px; font-weight:600; letter-spacing:.02em; color:var(--cream); padding:10px 16px; border-radius:999px; border:1px solid var(--line-2); transition:border-color .2s, background .2s, color .2s; }
.topbar__btn:hover{ border-color:var(--cream); }
.topbar__btn svg{ width:15px;height:15px; }
.topbar__btn--ghost{ border-color:transparent; color:var(--text-dim); }
.topbar__btn--ghost:hover{ color:var(--cream); border-color:transparent; }
.conn{ display:inline-flex; align-items:center; gap:8px; font-size:12px; font-weight:600; letter-spacing:.03em; color:var(--text-dim); padding:8px 14px; border-radius:999px; border:1px solid var(--line); }
.conn__d{ width:7px;height:7px;border-radius:50%; background:var(--text-dim); }
.conn.is-live{ color:#74e0a0; border-color:rgba(116,224,160,.3); }
.conn.is-live .conn__d{ background:#74e0a0; }

.wrap{ width:100%; max-width:1320px; margin:0 auto; padding:28px; flex:1; }

/* stats */
.stats{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:26px; }
.stat{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px 22px; }
.stat__label{ font-size:12px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--text-dim); }
.stat__value{ margin-top:12px; font-family:var(--ultra); font-size:42px; line-height:1; letter-spacing:-.02em; color:var(--cream); }
.stat__value .u{ font-size:18px; color:var(--text-dim); margin-left:2px; }

/* main split */
.board{ display:grid; grid-template-columns:minmax(320px,420px) 1fr; gap:18px; align-items:start; }
.list-col{ background:var(--panel); border:1px solid var(--line); border-radius:18px; overflow:hidden; }
.list-head{ display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--line); }
.search{ position:relative; flex:1; }
.search svg{ position:absolute; left:14px; top:50%; transform:translateY(-50%); width:16px;height:16px; color:var(--text-dim); }
.search input{ -webkit-appearance:none; appearance:none; width:100%; padding:11px 14px 11px 40px; border-radius:999px; border:1px solid var(--line-2); background:rgba(255,255,255,.02); color:var(--text); font-family:inherit; font-size:14px; }
.search input::placeholder{ color:rgba(255,255,255,.38); }
.search input:focus{ outline:none; border-color:var(--cream); }

.list{ max-height:calc(100vh - 320px); overflow-y:auto; }
.lead{ display:flex; align-items:center; gap:14px; padding:16px 18px; border-bottom:1px solid var(--line); cursor:pointer; transition:background .18s; }
.lead:last-child{ border-bottom:none; }
.lead:hover{ background:var(--panel-2); }
.lead.is-active{ background:var(--panel-2); box-shadow:inset 3px 0 0 var(--cream); }
.lead__avatar{ flex:none; width:40px; height:40px; border-radius:50%; display:grid; place-items:center; font-family:var(--ultra); font-size:14px; color:var(--cream); background:rgba(255,255,255,.06); border:1px solid var(--line-2); }
.lead__main{ flex:1; min-width:0; }
.lead__name{ font-size:15px; font-weight:600; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lead__company{ font-size:13px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.lead__meta{ flex:none; text-align:right; }
.lead__time{ font-size:12px; color:var(--text-dim); }
.lead__status{ display:inline-flex; align-items:center; gap:6px; margin-top:6px; font-size:11px; font-weight:600; letter-spacing:.03em; text-transform:uppercase; }
.lead__status .d{ width:7px;height:7px;border-radius:50%; }
/* lead-row status colors are applied inline from STATUS_MAP */

/* detail */
.detail{ background:var(--panel); border:1px solid var(--line); border-radius:18px; padding:0; min-height:420px; overflow:hidden; }
.detail__empty{ display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; min-height:420px; padding:40px; color:var(--text-dim); }
.detail__empty svg{ width:42px;height:42px; color:rgba(255,255,255,.2); margin-bottom:18px; }
.detail__empty p{ font-size:15px; }
.detail__head{ padding:26px 28px; border-bottom:1px solid var(--line); display:flex; align-items:flex-start; gap:18px; }
.detail__avatar{ flex:none; width:56px;height:56px; border-radius:50%; display:grid; place-items:center; font-family:var(--ultra); font-size:20px; color:#0a0a0a; background:var(--cream); }
.detail__id{ flex:1; }
.detail__name{ font-family:var(--ultra); font-size:26px; line-height:1.05; letter-spacing:-.01em; text-transform:uppercase; color:var(--cream); }
.detail__company{ margin-top:6px; font-size:15px; color:var(--text-dim); }
.detail__when{ margin-top:4px; font-size:13px; color:rgba(255,255,255,.4); }
.detail__close{ flex:none; width:40px;height:40px; border-radius:10px; border:1px solid var(--line-2); display:grid; place-items:center; color:var(--text-dim); transition:all .2s; }
.detail__close:hover{ color:var(--cream); border-color:var(--cream); background:rgba(255,255,255,.04); }
.detail__close svg{ width:19px;height:19px; }

/* hidden danger zone — delete tucked away + confirm */
.danger-zone{ margin-top:34px; padding-top:20px; border-top:1px solid var(--line); display:flex; justify-content:flex-end; align-items:center; min-height:40px; }
.del-link{ display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:rgba(255,255,255,.26); padding:9px 12px; border-radius:9px; transition:color .18s, background .18s; }
.del-link:hover{ color:#ff7a57; background:rgba(255,92,52,.06); }
.del-link svg{ width:15px;height:15px; }
.del-confirm{ display:flex; align-items:center; gap:12px; }
.del-confirm__txt{ font-size:12.5px; color:#ff9a7a; font-weight:600; }
.del-confirm button{ font-size:12.5px; font-weight:700; padding:9px 15px; border-radius:9px; }
.del-confirm .yes{ background:#ff5c34; color:#0a0a0a; }
.del-confirm .yes:hover{ background:#ff7048; }
.del-confirm .no{ border:1px solid var(--line-2); color:var(--text-dim); }
.del-confirm .no:hover{ border-color:var(--cream); color:var(--cream); }

/* stat sub line */
.stat__sub{ margin-top:9px; font-size:12px; font-weight:600; letter-spacing:.01em; color:var(--text-dim); }
.stat__value.is-closed{ color:#74e0a0; }
.stat__value.is-money{ font-size:38px; }

/* inbox filters */
.list-filters{ display:flex; flex-wrap:wrap; gap:8px; padding:14px 18px; border-bottom:1px solid var(--line); align-items:center; }
.fchip{ padding:8px 14px; border-radius:999px; border:1px solid var(--line-2); font-size:12.5px; font-weight:600; letter-spacing:.01em; color:var(--text-dim); transition:background .18s, border-color .18s, color .18s; }
.fchip:hover{ border-color:var(--cream); color:var(--cream); }
.fchip.is-on{ background:var(--cream); color:#0a0a0a; border-color:var(--cream); }
.fmonth{ position:relative; margin-left:auto; display:inline-flex; align-items:center; gap:7px; }
.fmonth label{ font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim); }
.fmonth input{ -webkit-appearance:none; appearance:none; background:rgba(255,255,255,.02); border:1px solid var(--line-2); color:var(--cream); border-radius:999px; padding:8px 12px; font-family:inherit; font-size:12.5px; color-scheme:dark; cursor:pointer; }
.fmonth input:focus{ outline:none; border-color:var(--cream); }
.fmonth input.is-on{ border-color:var(--cream); background:rgba(248,255,136,.07); }

/* topbar badge */
.topbar__badge{ display:inline-grid; place-items:center; min-width:18px; height:18px; padding:0 5px; border-radius:999px; background:#ff5c34; color:#0a0a0a; font-size:10px; font-weight:800; line-height:1; }
.topbar__badge:empty{ display:none; }

/* trash overlay */
.trash-ov{ position:fixed; inset:0; z-index:70; background:rgba(7,7,7,.74); backdrop-filter:blur(9px); display:none; align-items:flex-start; justify-content:center; padding:56px 20px; overflow-y:auto; }
.trash-ov.show{ display:flex; }
.trash-card{ width:100%; max-width:640px; background:var(--panel); border:1px solid var(--line-2); border-radius:18px; overflow:hidden; }
.trash-head{ display:flex; align-items:center; gap:14px; padding:22px 24px; border-bottom:1px solid var(--line); }
.trash-title{ font-family:var(--ultra); font-size:21px; text-transform:uppercase; letter-spacing:-.01em; color:var(--cream); }
.trash-head .topbar__spacer{ flex:1; }
.trash-x{ width:36px;height:36px; border-radius:9px; border:1px solid var(--line-2); display:grid; place-items:center; color:var(--text-dim); transition:all .2s; }
.trash-x:hover{ color:var(--cream); border-color:var(--cream); }
.trash-x svg{ width:18px;height:18px; }
.trash-list{ max-height:62vh; overflow-y:auto; }
.trash-row{ display:flex; align-items:center; gap:14px; padding:15px 24px; border-bottom:1px solid var(--line); }
.trash-row:last-child{ border-bottom:none; }
.trash-row__av{ flex:none; width:38px;height:38px; border-radius:50%; display:grid; place-items:center; font-family:var(--ultra); font-size:13px; color:var(--cream); background:rgba(255,255,255,.06); border:1px solid var(--line-2); }
.trash-row__main{ flex:1; min-width:0; }
.trash-row__name{ font-size:14px; font-weight:600; color:var(--cream); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.trash-row__meta{ font-size:12px; color:var(--text-dim); margin-top:2px; }
.trash-restore{ flex:none; display:inline-flex; align-items:center; gap:7px; padding:9px 14px; border-radius:999px; border:1px solid var(--line-2); color:var(--cream); font-size:12.5px; font-weight:600; transition:all .18s; }
.trash-restore:hover{ border-color:var(--cream); background:rgba(255,255,255,.04); }
.trash-restore svg{ width:14px;height:14px; }
.trash-purge{ flex:none; width:34px;height:34px; border-radius:9px; display:grid; place-items:center; color:rgba(255,255,255,.28); transition:color .18s; }
.trash-purge:hover{ color:#ff5c34; }
.trash-purge svg{ width:15px;height:15px; }
.trash-empty{ padding:54px 24px; text-align:center; color:var(--text-dim); font-size:14px; }
.trash-empty svg{ width:34px;height:34px; color:rgba(255,255,255,.18); margin:0 auto 16px; }

.detail__body{ padding:26px 28px; }
.contact-row{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:26px; }
.contact{ display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:12px; border:1px solid var(--line); background:var(--bg-2); transition:border-color .2s; }
.contact:hover{ border-color:var(--line-2); }
.contact__ic{ flex:none; width:34px;height:34px; border-radius:9px; display:grid; place-items:center; background:rgba(255,255,255,.05); color:var(--cream); }
.contact__ic svg{ width:16px;height:16px; }
.contact__t{ min-width:0; }
.contact__l{ font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); }
.contact__v{ font-size:14px; color:var(--cream); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.wa-btn{ display:flex; align-items:center; justify-content:center; gap:10px; width:100%; margin:-8px 0 26px; padding:14px 18px; border-radius:12px; background:#25D366; color:#072b16; font-size:14px; font-weight:700; letter-spacing:.01em; transition:transform .18s var(--ease-out), background .2s; }
.wa-btn:hover{ background:#2ee06f; transform:translateY(-1px); }
.wa-btn svg{ width:19px; height:19px; }

.status-group__label{ font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; }
.status-pills{ display:flex; flex-direction:column; gap:8px; margin-bottom:8px; }
.status-pill{ display:flex; align-items:center; gap:13px; width:100%; text-align:left; padding:13px 15px; border-radius:11px; border:1px solid var(--line-2); font-size:14px; font-weight:600; letter-spacing:.005em; color:var(--cream); transition:background .18s, border-color .18s, color .18s; }
.status-pill__n{ flex:none; width:23px;height:23px; border-radius:50%; display:grid; place-items:center; font-size:11px; font-weight:700; border:1.5px solid currentColor; color:var(--text-dim); }
.status-pill__l{ flex:1; }
.status-pill__check{ width:17px;height:17px; opacity:0; transition:opacity .18s; }
.status-pill:hover{ border-color:var(--cream); }
.status-pill.is-on{ color:#0a0a0a; font-weight:700; }
.status-pill.is-on .status-pill__n{ color:#0a0a0a; }
.status-pill.is-on .status-pill__check{ opacity:1; }

.ans{ margin-bottom:22px; }
.ans__label{ font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--text-dim); margin-bottom:12px; }
.ans__chips{ display:flex; flex-wrap:wrap; gap:8px; }
.chip{ padding:9px 15px; border-radius:999px; border:1px solid var(--line-2); font-size:13px; color:var(--cream); background:rgba(255,255,255,.02); }
.chip--value{ background:var(--cream); color:#0a0a0a; border-color:var(--cream); font-family:var(--ultra); font-size:14px; letter-spacing:.01em; padding:10px 18px; }
.ans__none{ font-size:13px; color:rgba(255,255,255,.3); }

/* empty board */
.empty{ text-align:center; padding:80px 24px; }
.empty__ic{ width:64px;height:64px;border-radius:50%; margin:0 auto 24px; display:grid; place-items:center; border:1px solid var(--line-2); color:var(--text-dim); }
.empty__ic svg{ width:28px;height:28px; }
.empty__title{ font-family:var(--ultra); font-size:26px; text-transform:uppercase; letter-spacing:-.01em; color:var(--cream); }
.empty__sub{ margin:14px auto 0; max-width:420px; font-size:15px; line-height:1.55; color:var(--text-dim); }
.empty__btn{ margin-top:26px; display:inline-flex; align-items:center; gap:10px; padding:14px 26px; border-radius:999px; border:1px solid var(--line-2); color:var(--cream); font-size:13px; font-weight:600; letter-spacing:.03em; transition:border-color .2s, background .2s; }
.empty__btn:hover{ border-color:var(--cream); }

.toast{ position:fixed; left:50%; bottom:28px; transform:translate(-50%,20px); z-index:60; padding:13px 22px; border-radius:999px; background:var(--cream); color:#0a0a0a; font-size:13px; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s, transform .25s var(--ease-out); }
.toast.show{ opacity:1; transform:translate(-50%,0); }

/* ============ AI PREP ============ */
.ai-prep{ margin:28px 0 4px; display:flex; flex-direction:column; gap:14px; }
.ai-block{ border:1px solid var(--line); border-radius:14px; background:var(--bg-2); overflow:hidden; }
.ai-block__head{ display:flex; align-items:center; gap:10px; padding:13px 15px; border-bottom:1px solid var(--line); }
.ai-block__title{ font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--cream); }
.ai-block__spacer{ flex:1; }
.ai-tag{ font-size:9.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; padding:3px 7px; border-radius:999px; background:rgba(248,255,136,.14); color:var(--yellow); border:1px solid rgba(248,255,136,.3); }
.ai-tag--muted{ background:rgba(255,255,255,.05); color:var(--text-dim); border-color:var(--line-2); }
.ai-link{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-weight:600; color:var(--text-dim); max-width:240px; }
.ai-link span{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ai-link:hover{ color:var(--cream); }
.ai-link svg{ flex:none; width:13px;height:13px; }
.ai-regen{ flex:none; width:28px;height:28px; border-radius:7px; border:1px solid var(--line-2); display:grid; place-items:center; color:var(--text-dim); transition:all .18s; }
.ai-regen:hover{ color:var(--cream); border-color:var(--cream); }
.ai-regen svg{ width:14px;height:14px; }
.ai-body{ padding:14px 15px; font-size:14px; line-height:1.62; color:var(--cream-2); }
.ai-tips{ list-style:none; padding:13px 15px; margin:0; display:flex; flex-direction:column; gap:11px; }
.ai-tips li{ position:relative; padding-left:24px; font-size:14px; line-height:1.5; color:var(--cream-2); }
.ai-tips li::before{ content:''; position:absolute; left:3px; top:7px; width:8px;height:8px; border-radius:50%; background:var(--yellow); }
.ai-disclaimer{ padding:0 15px 13px; font-size:11.5px; line-height:1.5; color:var(--text-dim); font-style:italic; }
.ai-note{ padding:14px 15px; font-size:13px; line-height:1.55; color:var(--text-dim); }
.ai-note.is-err{ color:#ff9a7a; font-style:normal; }
.ai-skeleton{ padding:14px 15px; display:flex; flex-direction:column; gap:9px; }
.ai-skeleton span{ display:block; height:11px; border-radius:6px; background:linear-gradient(90deg,rgba(255,255,255,.05),rgba(255,255,255,.12),rgba(255,255,255,.05)); background-size:200% 100%; animation:aishimmer 1.3s infinite; }
@keyframes aishimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media (max-width:920px){
  .stats{ grid-template-columns:repeat(2,1fr); }
  .board{ grid-template-columns:1fr; }
  .list{ max-height:none; }
  .detail{ display:none; }
  .detail.is-open{ display:block; position:fixed; inset:0; z-index:40; border-radius:0; min-height:100vh; overflow-y:auto; }
  .detail__back{ display:flex; }
}
.detail__back{ display:none; align-items:center; gap:10px; padding:16px 22px; border-bottom:1px solid var(--line); font-size:14px; color:var(--cream); }
.detail__back svg{ width:18px;height:18px; }
@media (max-width:560px){
  .topbar{ padding:14px 16px; gap:10px; }
  .topbar__name{ display:none; }
  .topbar__btn span{ display:none; }
  .topbar__btn{ padding:10px; }
  .wrap{ padding:18px 16px; }
  .contact-row{ grid-template-columns:1fr; }
}
</style>
</head>

<script>window.BOOST_CONFIG = { endpoint: "https://script.google.com/macros/s/AKfycbzhRBu3rCILPM_5ArO9Wirs_cHqt8hCKX1xUJ2nJQscyXQxYKVvIPNFtcQCvf_qXMzp/exec" };</script>

<script>
(function(){
  'use strict';
  var CODE = '84028402';
  var LEADS_KEY = 'boostLeads';
  var TRASH_KEY = 'boostTrash';
  var AI_KEY = 'boostAI';
  var AUTH_KEY = 'boostCrmAuth';

  var loginEl = document.getElementById('login');
  var appEl = document.getElementById('app');
  var form = document.getElementById('loginForm');
  var input = document.getElementById('codeInput');
  var errEl = document.getElementById('loginErr');

  var selectedId = null;

  /* ---------- auth ---------- */
  function isAuthed(){ try { return sessionStorage.getItem(AUTH_KEY) === '1'; } catch(e){ return false; } }
  function openApp(){ loginEl.style.display='none'; appEl.classList.add('show'); render(); syncRemote(); }
  form.addEventListener('submit', function(e){
    e.preventDefault();
    if(input.value.trim() === CODE){
      try { sessionStorage.setItem(AUTH_KEY,'1'); } catch(e){}
      errEl.classList.remove('show'); openApp();
    } else {
      errEl.classList.add('show'); loginEl.classList.add('shake');
      setTimeout(function(){ loginEl.classList.remove('shake'); }, 460);
      input.value=''; input.focus();
    }
  });
  document.getElementById('logoutBtn').addEventListener('click', function(){
    try { sessionStorage.removeItem(AUTH_KEY); } catch(e){}
    appEl.classList.remove('show'); loginEl.style.display='flex'; input.value=''; input.focus();
  });

  /* ---------- data ---------- */
  function load(){ try { return JSON.parse(localStorage.getItem(LEADS_KEY) || '[]'); } catch(e){ return []; } }
  function save(leads){ try { localStorage.setItem(LEADS_KEY, JSON.stringify(leads)); } catch(e){} }
  function loadTrash(){ try { return JSON.parse(localStorage.getItem(TRASH_KEY) || '[]'); } catch(e){ return []; } }
  function saveTrash(t){ try { localStorage.setItem(TRASH_KEY, JSON.stringify(t)); } catch(e){} }
  function byTs(a,b){ return b.ts - a.ts; }

  /* ---------- remote (optional CRM backend) ---------- */
  function endpoint(){ var c = window.BOOST_CONFIG || {}; return c.endpoint || ''; }
  function setConn(live){
    var el = document.getElementById('conn'); if(!el) return;
    el.classList.toggle('is-live', !!live);
    document.getElementById('connTxt').textContent = live ? 'Live' : 'Lokaal';
  }
  function fetchRemote(cb){
    var ep = endpoint();
    if(!ep){ cb(null); return; }
    var name = '__boostCb' + Date.now();
    var s = document.createElement('script');
    var done = false;
    window[name] = function(data){ done = true; try{ delete window[name]; }catch(e){ window[name]=undefined; } s.remove(); cb(data && data.leads ? data.leads : []); };
    s.onerror = function(){ if(done) return; try{ delete window[name]; }catch(e){} s.remove(); cb(null); };
    s.src = ep + (ep.indexOf('?')>-1?'&':'?') + 'action=list&callback=' + name + '&_=' + Date.now();
    document.body.appendChild(s);
    setTimeout(function(){ if(!done){ s.remove(); cb(null); } }, 8000);
  }
  function syncRemote(){
    if(!endpoint()){ setConn(false); return; }
    fetchRemote(function(remote){
      if(remote === null){ setConn(false); return; }
      setConn(true);
      var map = {};
      remote.forEach(function(l){ map[l.id] = l; });
      load().forEach(function(l){ if(!map[l.id]) map[l.id] = l; }); // keep just-submitted local-only leads
      var merged = Object.keys(map).map(function(k){ return map[k]; }).sort(function(a,b){ return b.ts - a.ts; });
      save(merged); render();
    });
  }
  function postAction(obj){
    var ep = endpoint(); if(!ep) return;
    try { fetch(ep, { method:'POST', mode:'no-cors', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(obj) }); } catch(e){}
  }

  function initials(name, company){
    var s = (name||company||'?').trim().split(/\s+/);
    if(s.length>=2) return (s[0][0]+s[1][0]).toUpperCase();
    return (s[0]||'?').slice(0,2).toUpperCase();
  }
  function esc(t){ return (t==null?'':String(t)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function timeAgo(ts){
    var d = Date.now()-ts, m=Math.floor(d/60000), h=Math.floor(m/60), day=Math.floor(h/24);
    if(m<1) return 'zojuist'; if(m<60) return m+' min geleden'; if(h<24) return h+' uur geleden';
    if(day<7) return day+' d geleden';

  }
  function fullDate(ts){ return new Date(ts).toLocaleString('nl-NL',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit'}); }

  /* ---------- status pipeline ---------- */
  var STATUSES = [

    { key:'msg',     label:'1e bericht verstuurd', short:'1e bericht', color:'#7cc6ff' },
    { key:'meeting', label:'Meeting met Dennis',   short:'Meeting',    color:'#b9a3ff' },
    { key:'offerte', label:'Offerte gestuurd',     short:'Offerte',    color:'#ffc879' },
    { key:'closed',  label:'Geclosed',             short:'Geclosed',   color:'#74e0a0' }
  ];
  var STATUS_MAP = {}; STATUSES.forEach(function(s){ STATUS_MAP[s.key] = s; });
  // legacy values from older versions
  function normStatus(s){ if(s==='won') return 'closed'; if(s==='called') return 'msg'; return STATUS_MAP[s] ? s : 'new'; }
  function statusInfo(s){ return STATUS_MAP[normStatus(s)]; }
  function statusLabel(s){ return statusInfo(s).label; }

  /* ---------- value math (potentiële waarde) ---------- */
  // ranges look like '€25K – €50K' or '€100K+'; use the midpoint of the range
  function valueAvg(v){
    if(!v) return 0;
    var nums = String(v).match(/\d+(?:[.,]\d+)?/g);
    if(!nums || !nums.length) return 0;
    nums = nums.map(function(n){ return parseFloat(n.replace(',','.')); });
    var avg = nums.length >= 2 ? (nums[0] + nums[1]) / 2 : nums[0];
    return Math.round(avg * 1000); // values are stated in K
  }
  function fmtMoney(n){
    if(n >= 1000000){ var m = n / 1000000; return '€' + (m % 1 ? m.toFixed(1).replace('.',',') : m) + 'M'; }

    return '€' + n;
  }

  /* ---------- AI prep (samenvatting + bedrijf-indicatie + sales tips) ---------- */
  var aiPending = {};
  function loadAI(){ try { return JSON.parse(localStorage.getItem(AI_KEY) || '{}'); } catch(e){ return {}; } }
  function saveAI(o){ try { localStorage.setItem(AI_KEY, JSON.stringify(o)); } catch(e){} }
  function aiAvailable(){ return !!(window.claude && typeof window.claude.complete === 'function'); }
  function aiKey(l){ return [l.name,l.company,(l.recognise||[]).join('|'),(l.ambition||[]).join('|'),(l.risk||[]).join('|'),l.value].join('~'); }
  function firstNameOf(l){ return ((l.name||'').trim().split(/\s+/)[0] || ''); }
  function searchQuery(l){ return (firstNameOf(l) + ' ' + (l.company||'')).trim(); }
  function googleUrl(l){ return 'https://www.google.com/search?q=' + encodeURIComponent(searchQuery(l)); }
  function textHtml(t){ return esc(t).replace(/\n+/g,'<br>'); }

  // deterministic summary from the filled-in answers — always available, no AI needed
  function composeSummary(l){
    var parts = [];

    if(l.ambition && l.ambition.length) parts.push('Wil richting ' + l.ambition.join(', ').toLowerCase() + '.');
    if(l.risk && l.risk.length) parts.push('Vreest bij niets doen: ' + l.risk.join(', ').toLowerCase() + '.');

  function aiPrompt(l){
    var fn = firstNameOf(l);

      'Hieronder de gegevens van een lead die de online "Boost Scan" heeft ingevuld.\n\n'+

      'Herkent zich in: '+((l.recognise||[]).join(', ')||'-')+'\n'+
      'Wil bereiken: '+((l.ambition||[]).join(', ')||'-')+'\n'+
      'Risico bij niets doen: '+((l.risk||[]).join(', ')||'-')+'\n'+
      'Budget-indicatie: '+(l.value||'-')+'\n\n'+
      'Geef UITSLUITEND geldige JSON terug (geen markdown, geen tekst eromheen) met exact deze structuur:\n'+
      '{"summary": "2 tot 3 zinnen die samenvatten wat deze klant invulde en waar de pijn zit", '+
      '"company": "6 tot 7 zinnen met een INSCHATTING van wat het bedrijf van '+(fn||'deze persoon')+' bij '+(l.company||'dit bedrijf')+' waarschijnlijk doet: sector, type werk, vermoedelijke doelgroep en grootte. Begin met een korte zin dat dit een indicatie is op basis van de naam en kan afwijken van de werkelijkheid.", '+
      '"tips": ["3 tot 4 concrete sales-tips, toegespitst op de pijnpunten en ambities van DEZE specifieke lead, elk 1 zin"]}\n'+
      'Schrijf alles in vlot Nederlands.';

  function parseAIJSON(s){

  }
  function generateAI(l){
    return window.claude.complete({ messages:[{ role:'user', content: aiPrompt(l) }] }).then(function(res){
      var d = parseAIJSON(res);

        summary: (d.summary && String(d.summary).trim()) || composeSummary(l),

  function ensureAI(l){

  /* ---------- render ---------- */
  var searchTerm = '';
  var dateFilter = 'all';   // 'all' | 'today' | 'week' | 'month' | 'ym'

  function renderStats(leads){

      stat('Geclosed', fmtMoney(closedVal), closedLeads.length+(closedLeads.length===1?' deal':' deals'), 'is-money is-closed') +

  // normalise a (Dutch) phone number to a wa.me-friendly international form
  function waNumber(phone){
    var d = String(phone||'').replace(/\D/g,'');

    if(d.indexOf('0031')===0) d = '31' + d.slice(4);
    else if(d.indexOf('00')===0) d = d.slice(2);
    else if(d.charAt(0)==='0') d = '31' + d.slice(1);
    else if(d.length===9 && d.charAt(0)==='6') d = '31' + d; // NL mobile without leading 0
    return d;
  }

    if(!n) return '';
    var wa = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.9c0 1.76.46 3.45 1.33 4.95L2 22l5.27-1.38a9.9 9.9 0 004.77 1.22h.01c5.46 0 9.9-4.45 9.9-9.9 0-2.65-1.03-5.13-2.9-7A9.82 9.82 0 0012.04 2zm0 18.14h-.01a8.2 8.2 0 01-4.18-1.15l-.3-.18-3.1.81.83-3.02-.2-.31a8.2 8.2 0 01-1.26-4.39c0-4.54 3.7-8.23 8.24-8.23 2.2 0 4.27.86 5.82 2.42a8.18 8.18 0 012.41 5.82c0 4.54-3.69 8.23-8.22 8.23zm4.52-6.16c-.25-.13-1.47-.72-1.69-.8-.23-.09-.39-.13-.56.12-.16.25-.64.8-.79.97-.14.16-.29.18-.54.06-.25-.12-1.05-.39-1.99-1.23-.74-.66-1.23-1.47-1.38-1.72-.14-.25-.01-.39.11-.51.11-.11.25-.29.37-.43.13-.15.17-.25.25-.42.08-.16.04-.31-.02-.43-.06-.12-.56-1.34-.76-1.84-.2-.48-.4-.42-.56-.43h-.48c-.16 0-.43.06-.65.31-.22.25-.86.84-.86 2.05 0 1.21.88 2.38 1 2.55.12.16 1.73 2.64 4.19 3.7.58.25 1.04.4 1.4.51.59.19 1.12.16 1.54.1.47-.07 1.47-.6 1.68-1.18.21-.58.21-1.07.14-1.18-.06-.1-.22-.16-.47-.28z"/></svg>';
    return '<a class="wa-btn" href="https://wa.me/'+n+'" target="_blank" rel="noopener">'+wa+'Open in WhatsApp</a>';
  }

  function emptyHTML(){
    return '<div class="empty">' +
      '<div class="empty__ic"><svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>' +
      '<div class="empty__title">Nog geen leads</div>' +
      '<p class="empty__sub">Zodra iemand de Boost Scan invult, verschijnt de aanvraag hier — inclusief alle antwoorden. Test het zelf, of genereer een voorbeeld-lead.</p>' +
      '<button class="empty__btn" id="seedBtn">Genereer voorbeeld-lead</button>' +
    '</div>';
  }

  /* ---------- wiring ---------- */
  function wireBoard(){
    var si = document.getElementById('searchInput');
    if(si){ si.addEventListener('input', function(){ searchTerm = si.value; var pos=si.selectionStart; render(); var ns=document.getElementById('searchInput'); if(ns){ ns.focus(); try{ns.setSelectionRange(pos,pos);}catch(e){} } }); }
    document.querySelectorAll('.lead').forEach(function(row){
      row.addEventListener('click', function(){ selectedId = row.getAttribute('data-id'); render(); var d=document.getElementById('detail'); if(d && window.innerWidth<=920) d.classList.add('is-open'); });
    });
    var back = document.getElementById('detailBack');
    if(back) back.addEventListener('click', closeDetail);
    var close = document.getElementById('detailClose');
    if(close) close.addEventListener('click', closeDetail);
    // date filter chips
    document.querySelectorAll('.list-filters .fchip').forEach(function(c){
      c.addEventListener('click', function(){ dateFilter = c.getAttribute('data-date'); monthFilter=''; render(); });
    });
    var mi = document.getElementById('monthInput');
    if(mi) mi.addEventListener('change', function(){
      if(mi.value){ dateFilter='ym'; monthFilter=mi.value; } else { dateFilter='all'; monthFilter=''; }
      render();
    });
    // delete — tucked away, two-step confirm so nothing is binned by accident
    var del = document.getElementById('delBtn');
    if(del) del.addEventListener('click', function(){
      var zone = document.getElementById('dangerZone');
      if(!zone) return;
      zone.innerHTML = '<div class="del-confirm"><span class="del-confirm__txt">Lead naar prullenbak?</span>' +
        '<button class="no" id="delNo">Annuleer</button><button class="yes" id="delYes">Verwijder</button></div>';
      document.getElementById('delNo').addEventListener('click', function(){ render(); });
      document.getElementById('delYes').addEventListener('click', function(){ deleteLead(selectedId); });
    });
    document.querySelectorAll('#statusPills .status-pill').forEach(function(p){
      p.addEventListener('click', function(){
        var s = p.getAttribute('data-status');
        postAction({ type:'status', id:selectedId, status:s });
        var leads = load(); leads.forEach(function(l){ if(l.id===selectedId) l.status=s; }); save(leads); render(); toast('Status: '+statusLabel(s));
      });
    });
    // AI prep — auto-generate on open (cached thereafter) + manual regenerate
    var curLead = load().filter(function(l){ return l.id===selectedId; })[0];
    if(curLead) ensureAI(curLead);
    var regen = document.getElementById('aiRegen');
    if(regen) regen.addEventListener('click', function(){
      var l = load().filter(function(x){ return x.id===selectedId; })[0]; if(!l) return;
      if(!aiAvailable()){ toast('AI niet beschikbaar in deze weergave'); return; }
      if(aiPending[l.id]) return;
      aiPending[l.id] = true; showAILoading(l.id);
      generateAI(l).then(function(rec){ delete aiPending[l.id]; var c=loadAI(); c[l.id]=rec; saveAI(c); fillAI(l.id, rec); toast('AI-inzicht vernieuwd'); })
        .catch(function(){ delete aiPending[l.id]; fillAIError(l.id); toast('AI-fout — probeer opnieuw'); });
    });
  }
  function closeDetail(){
    var d=document.getElementById('detail');
    if(window.innerWidth<=920){ if(d) d.classList.remove('is-open'); }
    else { selectedId=null; render(); }
  }
  function wireEmpty(){
    var sb = document.getElementById('seedBtn');
    if(sb) sb.addEventListener('click', function(){
      var leads = load();
      leads.unshift({ id:'L'+Date.now().toString(36).toUpperCase(), ts:Date.now()-3600000,
        name:'Sanne de Vries', company:'Atelier Noord', email:'sanne@ateliernoord.nl', phone:'+31 6 24 81 33 90',
        recognise:['Zwakke branding','Te weinig aandacht','Meer potentieel dan resultaat'],
        ambition:['Sterker merk','Premium klanten','Meer omzet'],
        risk:['Concurrenten groeien harder','Onzichtbaar blijven'],
        value:'€25K – €50K', status:'new' });
      save(leads); selectedId=null; render(); toast('Voorbeeld-lead toegevoegd');
    });
  }

  document.getElementById('refreshBtn').addEventListener('click', function(){
    if(!endpoint()){ toast('Geen koppeling — lokale modus'); render(); return; }
    toast('Vernieuwen…'); syncRemote();
  });

  /* ---------- export ---------- */
  document.getElementById('exportBtn').addEventListener('click', function(){
    var leads = load();
    if(!leads.length){ toast('Geen leads om te exporteren'); return; }
    var cols = ['Datum','Naam','Bedrijf','E-mail','Telefoon','Status','Herkenning','Ambitie','Risico','Waarde'];
    var rows = leads.map(function(l){
      return [ new Date(l.ts).toLocaleString('nl-NL'), l.name, l.company, l.email, l.phone, statusLabel(l.status),
        (l.recognise||[]).join(' | '), (l.ambition||[]).join(' | '), (l.risk||[]).join(' | '), l.value ].map(csvCell).join(',');
    });
    var csv = cols.join(',') + '\\n' + rows.join('\\n');
    var blob = new Blob(['\\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'boost-leads-'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    toast(leads.length+' leads geëxporteerd');
  });
  function csvCell(v){ v = (v==null?'':String(v)); return '"'+v.replace(/"/g,'""')+'"'; }

  /* ---------- toast ---------- */
  var toastEl = document.getElementById('toast'), toastT=null;
  function toast(msg){ toastEl.textContent=msg; toastEl.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(function(){ toastEl.classList.remove('show'); },2200); }

  /* ---------- prullenbak (soft delete + restore) ---------- */
  function deleteLead(id){
    if(!id) return;
    var leads = load();
    var lead = leads.filter(function(l){ return l.id===id; })[0];
    var rest = leads.filter(function(l){ return l.id!==id; });
    if(lead){ lead._deletedTs = Date.now(); var trash = loadTrash(); trash.unshift(lead); saveTrash(trash); }
    save(rest);
    postAction({ type:'delete', id:id });
    selectedId = null; render(); toast('Lead naar prullenbak');
  }
  function restoreLead(id){
    var trash = loadTrash();
    var lead = trash.filter(function(l){ return l.id===id; })[0];
    var rest = trash.filter(function(l){ return l.id!==id; });
    if(lead){ delete lead._deletedTs; var leads = load(); leads.unshift(lead); leads.sort(byTs); save(leads); postAction({ type:'restore', id:id, lead:lead }); }
    saveTrash(rest); selectedId = id; render(); renderTrash(); toast('Lead teruggezet');
  }
  function purgeLead(id){
    saveTrash(loadTrash().filter(function(l){ return l.id!==id; }));
    renderTrash(); updateTrashBadge(); toast('Definitief verwijderd');
  }
  function updateTrashBadge(){
    var b = document.getElementById('trashBadge'); if(!b) return;
    var n = loadTrash().length; b.textContent = n ? n : '';
  }
  function renderTrash(){
    var list = document.getElementById('trashList'); if(!list) return;
    var trash = loadTrash();
    if(!trash.length){
      list.innerHTML = '<div class="trash-empty"><svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m2 0v12a2 2 0 01-2 2H8a2 2 0 01-2-2V7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>De prullenbak is leeg. Verwijderde leads kun je hier terugzetten.</div>';
      return;
    }
    list.innerHTML = trash.map(function(l){
      var when = l._deletedTs ? ('Verwijderd · '+timeAgo(l._deletedTs)) : 'Verwijderd';
      return '<div class="trash-row">' +
        '<div class="trash-row__av">'+initials(l.name,l.company)+'</div>' +
        '<div class="trash-row__main">' +
          '<div class="trash-row__name">'+esc(l.name||'Onbekend')+(l.company?' · '+esc(l.company):'')+'</div>' +
          '<div class="trash-row__meta">'+when+(l.value?' · '+esc(l.value):'')+'</div>' +
        '</div>' +
        '<button class="trash-restore" data-restore="'+l.id+'"><svg viewBox="0 0 24 24" fill="none"><path d="M4 4v6h6M20 20v-6h-6M20 9A8 8 0 006 5.3L4 7m0 10a8 8 0 0014 1.7l2-1.7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>Terugzetten</button>' +
        '<button class="trash-purge" data-purge="'+l.id+'" title="Definitief verwijderen"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></button>' +
      '</div>';
    }).join('');
    list.querySelectorAll('[data-restore]').forEach(function(b){ b.addEventListener('click', function(){ restoreLead(b.getAttribute('data-restore')); }); });
    list.querySelectorAll('[data-purge]').forEach(function(b){ b.addEventListener('click', function(){ purgeLead(b.getAttribute('data-purge')); }); });
  }
  var trashOv = document.getElementById('trashOv');
  function openTrash(){ renderTrash(); trashOv.classList.add('show'); trashOv.setAttribute('aria-hidden','false'); }
  function closeTrash(){ trashOv.classList.remove('show'); trashOv.setAttribute('aria-hidden','true'); }
  document.getElementById('trashBtn').addEventListener('click', openTrash);
  document.getElementById('trashClose').addEventListener('click', closeTrash);
  trashOv.addEventListener('click', function(e){ if(e.target===trashOv) closeTrash(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && trashOv.classList.contains('show')) closeTrash(); });

  /* ---------- boot ---------- */
  if(isAuthed()) openApp(); else { input.focus(); }
  updateTrashBadge();
  // live refresh if a lead comes in from another tab
  window.addEventListener('storage', function(e){ if((e.key===LEADS_KEY||e.key===TRASH_KEY) && appEl.classList.contains('show')){ render(); if(trashOv.classList.contains('show')) renderTrash(); } });
})();
</script>

</body>
</html>
