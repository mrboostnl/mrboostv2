document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

.9309 34.7578 17.0801L34.752 16.9102V16.8994L34.7568 16.6406C34.7906 16.0388 34.9793 15.4543 35.3076 14.9453C35.683 14.3636 36.2234 13.9066 36.8594 13.6328Z\" fill=\"#F8FF88\" stroke=\"black\" stroke-width=\"2.5\"><\u002Fpath><path d=\"M16.848 55.7315C15.6011 55.7662 14.3667 55.4748 13.2669 54.8862C12.592 54.505 12.0085 53.9808 11.5573 53.3505C11.1062 52.7202 10.7981 51.9989 10.6549 51.237C10.3385 50.1067 9.31034 42.7958 26.819 22.8459C26.9238 22.7287 27.0564 22.6398 27.2046 22.5875C27.3528 22.5352 27.5118 22.5211 27.667 22.5465C27.8221 22.5736 27.9677 22.6402 28.0897 22.7399C28.2117 22.8396 28.3059 22.9689 28.3635 23.1156C29.9058 27.244 30.9751 31.534 31.551 35.9033C32.3358 42.3921 31.4096 47.3572 28.8616 50.5603C27.83 51.8572 26.5014 52.8867 24.9881 53.5618C22.4536 54.8393 19.6821 55.578 16.848 55.7315Z\" fill=\"#D0CFCD\"><\u002Fpath><path d=\"M50.4421 55.7309C47.6083 55.5779 44.837 54.8392 42.303 53.5616C36.9076 51.1172 34.6371 45.0111 35.7388 35.9029C36.3149 31.5336 37.3842 27.2437 38.9263 23.1152C38.9837 22.9686 39.0779 22.8393 39.1997 22.7396C39.3215 22.64 39.4669 22.5733 39.6219 22.5461C39.7772 22.52 39.9366 22.5337 40.0851 22.5861C40.2335 22.6385 40.3663 22.7277 40.4708 22.8455C57.9798 42.7954 56.9516 50.1062 56.6349 51.2366C56.4917 51.9984 56.1837 52.7197 55.7325 53.3501C55.2813 53.9804 54.6978 54.5045 54.0229 54.8858C52.9232 55.4743 51.6889 55.7656 50.4421 55.7309Z\" fill=\"#D0CFCD\"><\u002Fpath><path d=\"M32.9829 34.4411C32.9595 34.4411 32.9006 34.4392 32.8764 34.4375C28.9448 34.2501 26.6179 30.3213 25.9886 22.7594C25.9352 22.2205 25.9897 21.6765 26.1489 21.1589C26.3081 20.6413 26.5687 20.1607 26.9157 19.7449C28.6743 17.6438 32.2778 17.5371 32.9824 17.5371H33.8728C34.5773 17.5371 38.1816 17.6438 39.9395 19.7449C40.2864 20.1605 40.5471 20.6411 40.7063 21.1585C40.8655 21.6759 40.9201 22.2198 40.8669 22.7586C40.235 30.3213 37.908 34.2506 33.9513 34.4392L32.9829 34.4411Z\" fill=\"black\"><\u002Fpath><path d=\"M36.7673 50.5586C36.7673 50.5586 34.9659 53.4505 33.6498 53.4505C32.3338 53.4505 30.6006 50.5586 30.6006 50.5586\" stroke=\"black\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M29.2604 28.9832C31.2059 36.3501 33.0614 48.8961 24.6089 52.7245C12.3928 58.2575 11.5529 51.0319 11.5529 51.0319C11.5529 51.0319 9.23831 44.2803 27.4743 23.4902\" stroke=\"black\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M38.0678 28.8411C36.109 36.188 34.1749 48.8711 42.6818 52.7241C54.8978 58.2571 55.7378 51.0315 55.7378 51.0315C55.7378 51.0315 58.0523 44.2798 39.8159 23.4893\" stroke=\"black\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M27.6554 50.5586L28.1216 53.3655L24.3564 59.174\" stroke=\"black\" stroke-width=\"2.5\" stroke-miterlimit=\"10\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M39.7765 50.71L39.3359 53.3654L43.1002 59.1739\" stroke=\"black\" stroke-width=\"2.5\" stroke-miterlimit=\"10\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M14.875 14.7812L18.7421 22.532L24.881 26.5165\" stroke=\"black\" stroke-width=\"2.5\" stroke-miterlimit=\"10\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M52.3083 14.7812L48.4403 22.532L42.373 26.4706\" stroke=\"black\" stroke-width=\"2.5\" stroke-miterlimit=\"10\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>`;\n\ngsap.registerPlugin(Draggable, InertiaPlugin, Physics2DPlugin);\n\nfunction initConfettiExplosion(x, y) {\n  const dotCount = gsap.utils.random(10, 20, 1);\n  const colors   = [\"#F8FF88\", \"#B4A8F5\", \"#e9e8e3\", \"#8a8a8a\"];\n  const container = document.querySelector('[data-minigame-init]');\n\n  for (let i = 0; i < dotCount; i++) {\n    const dot = document.createElement(\"div\");\n    dot.classList.add(\"dot\");\n    container.appendChild(dot);\n\n    gsap.set(dot, {\n      left:  `${x}px`,\n      top:   `${y}px`,\n      scale: 0,\n      backgroundColor: gsap.utils.random(colors)\n    });\n\n    gsap.timeline({ onComplete: () => dot.remove() })\n      .to(dot, {\n        scale:    gsap.utils.random(0.3, 1),\n        duration: 0.3,\n        ease:     \"power3.out\"\n      })\n      .to(dot, {\n        duration: 2,\n        physics2D: {\n          velocity: gsap.utils.random(500, 1000),\n          angle:    gsap.utils.random(0, 360),\n          gravity:  500\n        },\n        autoAlpha: 0,\n        ease:      \"none\"\n      }, \"<\");\n  }\n}\n\nfunction init404Minigame() {\n  const CONFIG = {\n    dragToVelocityRatio: 0.01,\n    inertiaResistance:   20,\n    pullReset:           { duration: 0.8, ease: 'elastic.out(1,0.5)' },\n    rocketFadeOut:       { duration: 0.5 },\n    maxSpeed:            2000,\n    flyMinDuration:      1.5,\n    flyMaxDuration:      3,\n    flyRotateDuration:   1\n  };\n\n  const container     = document.querySelector('[data-minigame-init]');\n  const pull          = container.querySelector('[data-minigame-pull]');\n  const rocket        = container.querySelector('[data-minigame-rocket]');\n  const line          = container.querySelector('[data-minigame-line]');\n  const statusEl      = container.querySelector('[data-minigame-status]');\n  const scoreTimeSpan = container.querySelector('[data-minigame-score-time]');\n  const resetButton   = container.querySelector('[data-minigame-reset]');\n  const flies         = Array.from(container.querySelectorAll('[data-minigame-fly]'));\n\n  let dragStart, rocketTween, isFlying = false;\n  let containerRect, origin;\n  let startTime = null;\n\n  const rawTargets = [\n    ...container.querySelectorAll('[data-minigame-target]'),\n    ...flies\n  ];\n  const allTargets = rawTargets.filter(el => el && window.getComputedStyle(el).display !== 'none');\n  const totalTargets = allTargets.length;\n  console.log(`🎯 Targets on load: ${totalTargets}`);\n  const hitTargets   = new Set();\n  const flyTweens    = new Map();\n\n  function resetGame() {\n    hitTargets.clear();\n    allTargets.forEach(el => {\n      el.style.visibility    = '';\n      el.style.opacity       = '';\n      el.style.pointerEvents = '';\n    });\n\n    startTime = null;\n    statusEl.setAttribute('data-minigame-status','ready');\n    scoreTimeSpan.textContent = '0.00';\n\n    gsap.set([pull, rocket, line], {\n      clearProps: 'all',\n      x: 0, y: 0,\n      opacity: 1,\n      rotation: 0\n    });\n    isFlying = false;\n    if (rocketTween) rocketTween.kill();\n\n    containerRect = container.getBoundingClientRect();\n\n    flies.forEach(fly => {\n      if (flyTweens.has(fly)) flyTweens.get(fly).kill();\n\n      const maxX = containerRect.width  - fly.offsetWidth;\n      const maxY = containerRect.height - fly.offsetHeight;\n      const startX = gsap.utils.random(0, maxX);\n      const startY = gsap.utils.random(0, maxY);\n\n      gsap.set(fly, { clearProps: 'x,y,rotation' });\n      fly.style.left      = `${startX}px`;\n      fly.style.top       = `${startY}px`;\n      fly.style.transform = 'rotate(0deg)';\n\n      moveFly(fly);\n    });\n  }\n\n  resetButton.addEventListener('click', () => {\n    console.log('🔄 Resetting game');\n    resetGame();\n  });\n  resetGame();\n\n  function moveFly(fly) {\n    const maxX = containerRect.width  - fly.offsetWidth;\n    const maxY = containerRect.height - fly.offsetHeight;\n    const newX = gsap.utils.random(0, maxX);\n    const newY = gsap.utils.random(0, maxY);\n\n    const cur = fly.getBoundingClientRect();\n    const curX = cur.left - containerRect.left;\n    const curY = cur.top  - containerRect.top;\n    const dx = newX - curX;\n    const dy = newY - curY;\n    const targetAngle = Math.atan2(dy, dx) * 180 / Math.PI + 90;\n\n    gsap.to(fly, {\n      rotation: targetAngle,\n      duration: CONFIG.flyRotateDuration,\n      ease:     'elastic.out(1,0.75)'\n    });\n\n    const tween = gsap.to(fly, {\n      left:     `${newX}px`,\n      top:      `${newY}px`,\n      duration: gsap.utils.random(CONFIG.flyMinDuration, CONFIG.flyMaxDuration),\n      ease:     'power1.inOut',\n      onComplete: () => moveFly(fly)\n    });\n    flyTweens.set(fly, tween);\n  }\n\n  function rectsOverlap(r1, r2) {\n    return !(\n      r2.left   > r1.right ||\n      r2.right  < r1.left  ||\n      r2.top    > r1.bottom||\n      r2.bottom < r1.top\n    );\n  }\n\n  function onRocketUpdate() {\n    const rRect = rocket.getBoundingClientRect();\n    const cRect = containerRect;\n    if (\n      rRect.right  < cRect.left   ||\n      rRect.left   > cRect.right  ||\n      rRect.bottom < cRect.top    ||\n      rRect.top    > cRect.bottom\n    ) {\n      rocketTween.kill();\n      isFlying = false;\n      gsap.set(rocket, { opacity: 0 });\n      return;\n    }\n    for (let t of allTargets) {\n      if (hitTargets.has(t)) continue;\n      const tRect = t.getBoundingClientRect();\n      if (rectsOverlap(rRect, tRect)) {\n        hitTargets.add(t);\n        console.log(`🏹 Hit ${hitTargets.size}/${totalTargets}`);\n        if (flies.includes(t) && flyTweens.has(t)) flyTweens.get(t).kill();\n        explodeTarget(t, tRect);\n        onHit();\n        break;\n      }\n    }\n  }\n\n  function onHit() {\n    if (hitTargets.size === totalTargets) {\n      console.log('✅ All targets hit!');\n      const elapsed = ((Date.now() - startTime) / 1000).toFixed(2);\n      statusEl.setAttribute('data-minigame-status','finished');\n      scoreTimeSpan.textContent = elapsed;\n    }\n  }\n\n  function explodeTarget(el, tRect) {\n    gsap.to(el, {\n      scale:    0.95,\n      opacity:  0.1,\n      duration: 0.2,\n      pointerEvents: 'none'\n    });\n    const cx = tRect.left + tRect.width/2  + window.scrollX;\n    const cy = tRect.top  + tRect.height/2 + window.scrollY;\n    initConfettiExplosion(cx, cy);\n  }\n\n  Draggable.create(pull, {\n    type: 'x,y',\n    bounds: container,\n\n    onPress() {\n      if (isFlying) return this.endDrag();\n      if (!startTime) {\n        startTime = Date.now();\n        statusEl.setAttribute('data-minigame-status','running');\n      }\n      if (rocketTween) { rocketTween.kill(); isFlying = false; }\n      gsap.set(rocket, { clearProps:'all', x:0, y:0, opacity:0, rotation:0 });\n\n      containerRect         = container.getBoundingClientRect();\n      this.hasDraggedEnough = false;\n\n      const rb = rocket.getBoundingClientRect();\n      origin = {\n        x: (rb.left + rb.width/2) - containerRect.left,\n        y: (rb.top  + rb.height/2) - containerRect.top\n      };\n\n      Object.assign(line.style, {\n        left:            `${origin.x}px`,\n        top:             `${origin.y}px`,\n        width:           '0px',\n        transform:       'rotate(0deg)',\n        transformOrigin: '0 50%',\n        opacity:         '0'\n      });\n\n      const pr = pull.getBoundingClientRect();\n      dragStart = {\n        x: pr.left + pr.width/2,\n        y: pr.top  + pr.height/2\n      };\n      pull.classList.add('is--drag');\n      pull.style.cursor = 'grabbing';\n    },\n\n    onDrag() {\n      const pr = pull.getBoundingClientRect();\n      const px = (pr.left + pr.width/2) - containerRect.left;\n      const py = (pr.top  + pr.height/2) - containerRect.top;\n      const dx = px - origin.x, dy = py - origin.y;\n      const len = Math.hypot(dx, dy);\n      if (len >= 24) this.hasDraggedEnough = true;\n\n      const ang = Math.atan2(dy, dx) * 180 / Math.PI;\n      line.style.width     = `${len}px`;\n      line.style.transform = `rotate(${ang}deg)`;\n      line.style.opacity   = '1';\n      gsap.set(pull, { rotation: ang - 90 });\n    },\n\n    onRelease() {\n      pull.style.cursor = 'grab';\n      pull.classList.remove('is--drag');\n\n      if (!this.hasDraggedEnough || isFlying) {\n        gsap.to(pull, { x:0, y:0, rotate:0, ...CONFIG.pullReset });\n        gsap.to(line, { opacity:0, duration:0.2 });\n        return;\n      }\n\n      gsap.to(line, { opacity:0, duration:0.2 });\n\n      const pr   = pull.getBoundingClientRect();\n      const dx0  = dragStart.x - (pr.left + pr.width/2);\n      const dy0  = dragStart.y - (pr.top  + pr.height/2);\n      const avg  = (containerRect.width + containerRect.height)/2;\n      const scale= CONFIG.dragToVelocityRatio * avg;\n      let vx = dx0 * scale, vy = dy0 * scale;\n      const speed = Math.hypot(vx, vy);\n      if (speed > CONFIG.maxSpeed) {\n        const f = CONFIG.maxSpeed/speed;\n        vx *= f; vy *= f;\n      }\n\n      const launchAngle = Math.atan2(vy, vx) * 180 / Math.PI;\n      gsap.set(rocket, { rotation: launchAngle + 90 });\n      gsap.to(pull, { x:0, y:0, rotate:0, ...CONFIG.pullReset });\n      gsap.set(rocket, { x:0, y:0, opacity:1 });\n      isFlying = true;\n\n      rocketTween = gsap.to(rocket, {\n        inertia: {\n          x: { velocity: vx },\n          y: { velocity: vy },\n          resistance: CONFIG.inertiaResistance\n        },\n        onUpdate: onRocketUpdate,\n        onComplete: () => {\n          isFlying = false;\n          gsap.to(rocket, { opacity:0, duration: CONFIG.rocketFadeOut.duration });\n        }\n      });\n    }\n  });\n}\n\n// Initialize 404 Error Minigame\ndocument.addEventListener('DOMContentLoaded', function() {\n  const container = document.querySelector('[data-minigame-init]');\n  // Inject fly SVGs\n  container.querySelectorAll('[data-minigame-fly]').forEach(function (f) {\n    if (!f.querySelector('svg')) f.innerHTML = MINIGAME_FLY_SVG;\n  });\n  // Clone the rocket into the score screen as a static badge\n  const ball   = container.querySelector('.mingame__ball-svg');\n  const screen = container.querySelector('.minigame__score-screen');\n  if (ball && screen && !screen.querySelector('.minigame__score-svg')) {\n    const clone = ball.cloneNode(true);\n    clone.setAttribute('class', 'minigame__score-svg');\n    screen.insertBefore(clone, screen.firstChild);\n  }\n  init404Minigame();\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
